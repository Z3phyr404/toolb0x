<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  componentDidMount(){ this._init(); this._reveal(); }
  _init(){
    const scope = document.getElementById('scrPass');
    if(!scope){ requestAnimationFrame(()=>this._init()); return; }
    if(scope.dataset.glowReady) return;
    scope.dataset.glowReady = '1';
    const glows = scope.querySelectorAll('[data-glow]');
    const primary = scope.querySelector('[data-glow-primary]');
    const baseBg = primary ? primary.style.background : '';
    scope.addEventListener('mousemove', (e) => {
      const r = scope.getBoundingClientRect();
      const rx = (e.clientX - r.left) / Math.max(r.width,1) - 0.5;
      const ry = (e.clientY - r.top) / Math.max(r.height,1) - 0.5;
      glows.forEach(g => { const d = parseFloat(g.dataset.depth||'40'); g.style.transform = 'translate(' + (rx*d).toFixed(1) + 'px,' + (ry*d).toFixed(1) + 'px)'; });
    });
    scope.addEventListener('mouseleave', () => { glows.forEach(g => { g.style.transform = 'translate(0,0)'; }); });
    scope.querySelectorAll('[data-card]').forEach(card => {
      const c = card.getAttribute('data-glow-color');
      card.addEventListener('mouseenter', () => { if (primary) primary.style.background = 'radial-gradient(circle,' + c + ',transparent 70%)'; });
      card.addEventListener('mouseleave', () => { if (primary) primary.style.background = baseBg; });
    });
  }
  _reveal(){
    const scope = document.getElementById('scrPass');
    if(!scope){ requestAnimationFrame(()=>this._reveal()); return; }
    if(scope.dataset.revealReady) return;
    scope.dataset.revealReady = '1';
    const els = scope.querySelectorAll('[data-reveal]');
    els.forEach(el => { el.style.opacity='0'; el.style.transform='translateY(22px)'; el.style.transition='opacity 0.7s cubic-bezier(0.2,0.8,0.2,1), transform 0.7s cubic-bezier(0.2,0.8,0.2,1)'; });
    const io = new IntersectionObserver((entries) => {
      entries.forEach(en => {
        if (en.isIntersecting) {
          const el = en.target;
          const delay = (parseInt(el.dataset.revealIndex)||0) * 60;
          setTimeout(() => { el.style.opacity='1'; el.style.transform='translateY(0)'; }, delay);
          io.unobserve(el);
        }
      });
    }, { threshold: 0.1 });
    els.forEach(el => io.observe(el));
  }
}
</script>

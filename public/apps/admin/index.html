<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Toolb0x — Administration</title>
  <style nonce="__CSP_NONCE__">
    /* ============================================================
   iOS 26 LIQUID GLASS — ADMIN
   ============================================================ */

    @font-face {
      font-family: 'SF';
      src: local('SF Pro Display'), local('SF Pro Text'), local('-apple-system'), local('BlinkMacSystemFont'), local('Helvetica Neue');
    }

    :root {
      --glass-bg: rgba(255, 255, 255, 0.12);
      --glass-bg-heavy: rgba(255, 255, 255, 0.18);
      --glass-border: rgba(255, 255, 255, 0.22);
      --glass-border-light: rgba(255, 255, 255, 0.12);
      --glass-shadow: 0 8px 40px rgba(0, 0, 0, 0.15), 0 2px 12px rgba(0, 0, 0, 0.1);
      --glass-shadow-elevated: 0 12px 60px rgba(0, 0, 0, 0.2), 0 4px 20px rgba(0, 0, 0, 0.15);
      --glass-inset: inset 0 1px 0 rgba(255, 255, 255, 0.25), inset 0 -1px 0 rgba(255, 255, 255, 0.05);
      --glass-blur: 40px;
      --glass-saturate: 1.8;

      --text: rgba(0, 0, 0, 0.85);
      --text-secondary: rgba(0, 0, 0, 0.55);
      --text-tertiary: rgba(0, 0, 0, 0.35);

      --blue: #007AFF;
      --green: #30D158;
      --red: #FF3B30;
      --orange: #FF9500;
      --purple: #AF52DE;
      --pink: #FF2D55;
      --teal: #5AC8FA;
      --indigo: #5856D6;
      --mint: #00C7BE;
      --yellow: #FFCC00;

      --radius-sm: 12px;
      --radius: 20px;
      --radius-lg: 26px;
      --radius-xl: 32px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      font-family: 'SF', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
      color: var(--text);
      overflow: hidden;
    }

    /* ===== ANIMATED BACKGROUND ===== */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: linear-gradient(135deg, #a8c8f0 0%, #d4b8e8 25%, #f0c8c8 50%, #b8d8f0 75%, #c8e8d0 100%);
      background-size: 400% 400%;
      animation: bgShift 20s ease infinite;
    }

    .bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 600px 600px at 20% 20%, rgba(168, 200, 240, 0.6), transparent),
        radial-gradient(ellipse 500px 500px at 80% 30%, rgba(212, 184, 232, 0.5), transparent),
        radial-gradient(ellipse 400px 400px at 50% 80%, rgba(184, 216, 240, 0.5), transparent);
    }

    @keyframes bgShift {
      0%, 100% { background-position: 0% 50%; }
      25% { background-position: 100% 0%; }
      50% { background-position: 100% 100%; }
      75% { background-position: 0% 100%; }
    }

    .glass {
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate));
      -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate));
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow), var(--glass-inset);
    }

    .glass-heavy {
      background: var(--glass-bg-heavy);
      backdrop-filter: blur(50px) saturate(2);
      -webkit-backdrop-filter: blur(50px) saturate(2);
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow-elevated), var(--glass-inset);
    }

    /* ===== LAYOUT ===== */
    .app {
      position: relative;
      z-index: 1;
      height: 100%;
      display: flex;
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      width: 260px;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      border-right: 1px solid var(--glass-border-light);
    }

    .sidebar-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.03em;
      padding: 8px 12px 16px;
    }

    .sidebar-title span {
      background: linear-gradient(135deg, var(--indigo), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .nav-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      text-decoration: none;
      cursor: pointer;
      border: none;
      background: none;
      font-family: inherit;
      transition: background 0.2s;
    }

    .nav-btn:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    .nav-btn.active {
      background: rgba(255, 255, 255, 0.18);
      font-weight: 600;
    }

    .nav-icon {
      font-size: 18px;
      width: 24px;
      text-align: center;
    }

    .sidebar-spacer {
      flex: 1;
    }

    .back-portal-btn {
      color: var(--text-secondary);
      font-size: 13px;
      margin-top: 8px;
    }

    /* ===== MAIN CONTENT ===== */
    .main {
      flex: 1;
      padding: 32px 40px;
      overflow-y: auto;
    }

    .page-header {
      margin-bottom: 32px;
    }

    .page-title {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .page-subtitle {
      font-size: 14px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    /* ===== STATS GRID ===== */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }

    .stat-card {
      border-radius: var(--radius-lg);
      padding: 24px 20px;
      text-align: center;
    }

    .stat-icon {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      margin: 0 auto 12px;
    }

    .stat-value {
      font-size: 36px;
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1;
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 500;
    }

    /* ===== USER TABLE ===== */
    .section-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 16px;
      letter-spacing: -0.02em;
    }

    .user-table-wrap {
      border-radius: var(--radius-lg);
      overflow: hidden;
      margin-bottom: 32px;
    }

    .user-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    .user-table th {
      text-align: left;
      padding: 14px 16px;
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
      border-bottom: 1px solid var(--glass-border-light);
    }

    .user-table td {
      padding: 14px 16px;
      border-bottom: 1px solid var(--glass-border-light);
    }

    .user-table tr:last-child td {
      border-bottom: none;
    }

    .user-table tr:hover td {
      background: rgba(255, 255, 255, 0.06);
    }

    .user-email {
      color: var(--text-secondary);
      font-size: 13px;
    }

    .user-name-cell {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .user-name {
      font-weight: 600;
    }

    /* Badges */
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .badge-admin {
      background: rgba(88, 86, 214, 0.15);
      color: var(--indigo);
    }

    .badge-user {
      background: rgba(0, 122, 255, 0.12);
      color: var(--blue);
    }

    .badge-suspended {
      background: rgba(255, 59, 48, 0.12);
      color: var(--red);
    }

    .data-count {
      font-variant-numeric: tabular-nums;
      color: var(--text-secondary);
      font-size: 13px;
    }

    /* Suspend Button */
    .suspend-btn {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
    }

    .suspend-btn.suspend {
      background: rgba(255, 59, 48, 0.12);
      color: var(--red);
    }

    .suspend-btn.suspend:hover {
      background: rgba(255, 59, 48, 0.22);
    }

    .suspend-btn.unsuspend {
      background: rgba(48, 209, 88, 0.12);
      color: var(--green);
    }

    .suspend-btn.unsuspend:hover {
      background: rgba(48, 209, 88, 0.22);
    }

    .suspend-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .suspend-btn.is-admin {
      background: rgba(0, 0, 0, 0.04);
      color: var(--text-tertiary);
      cursor: default;
    }

    /* ===== TOAST ===== */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      padding: 14px 28px;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 500;
      z-index: 1000;
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.35s;
      opacity: 0;
      pointer-events: none;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* ===== LOADING ===== */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 200px;
      color: var(--text-tertiary);
      font-size: 15px;
    }

    /* ===== MOBILE ===== */
    @media (max-width: 768px) {
      .sidebar {
        display: none;
      }

      .main {
        padding: 24px 16px;
      }

      .stats-grid {
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .stat-card {
        padding: 18px 14px;
      }

      .stat-value {
        font-size: 28px;
      }

      .mobile-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 24px;
      }

      .mobile-back {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: var(--glass-bg);
        backdrop-filter: blur(20px);
        border: 1px solid var(--glass-border);
        text-decoration: none;
        font-size: 18px;
        color: var(--text);
      }

      .user-table-wrap {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }

      .user-table {
        min-width: 600px;
      }
    }

    @media (min-width: 769px) {
      .mobile-header {
        display: none;
      }
    }
  </style>
</head>

<body>
  <div class="bg"></div>

  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar glass-heavy">
      <div class="sidebar-title"><span>Admin</span></div>

      <button class="nav-btn active" type="button">
        <span class="nav-icon">&#128202;</span> Übersicht
      </button>

      <div class="sidebar-spacer"></div>

      <a href="/portal" class="nav-btn back-portal-btn">
        &#8592; Zur Übersicht
      </a>
    </aside>

    <!-- Hauptbereich -->
    <main class="main">
      <!-- Mobile Header -->
      <div class="mobile-header">
        <a href="/portal" class="mobile-back">&#8592;</a>
        <h1 style="font-size:20px;font-weight:700;">Administration</h1>
      </div>

      <div class="page-header">
        <h1 class="page-title">Administration</h1>
        <p class="page-subtitle">System-Übersicht und Nutzerverwaltung</p>
      </div>

      <div id="content">
        <div class="loading">Lade Daten...</div>
      </div>
    </main>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast glass-heavy"></div>

  <script nonce="__CSP_NONCE__" src="/shared/session-timeout.js"></script>
  <script nonce="__CSP_NONCE__">
    (async function () {
      // Auth prüfen + Admin-Check
      try {
        var meRes = await fetch('/api/auth/me');
        if (!meRes.ok) { window.location.href = '/portal'; return; }
        var me = (await meRes.json()).user;
        if (me.role !== 'admin') { window.location.href = '/portal'; return; }
      } catch (e) {
        window.location.href = '/portal'; return;
      }

      // Session-Timeout starten
      if (window.SessionTimeout) {
        SessionTimeout.start(function () { window.location.href = '/portal'; });
      }

      // Daten laden
      try {
        var statsRes = await fetch('/api/admin/stats');
        var usersRes = await fetch('/api/admin/users');
        if (!statsRes.ok || !usersRes.ok) throw new Error('Fehler');
        var stats = await statsRes.json();
        var usersData = await usersRes.json();

        renderDashboard(stats, usersData.users, me.id);
      } catch (e) {
        document.getElementById('content').innerHTML =
          '<div class="loading">Fehler beim Laden der Daten.</div>';
      }

      function renderDashboard(stats, users, myId) {
        var contentEl = document.getElementById('content');
        var activeCount = users.filter(function (u) { return !u.suspended; }).length;
        var suspendedCount = users.filter(function (u) { return u.suspended; }).length;

        var newestDate = stats.newestUser
          ? new Date(stats.newestUser.createdAt).toLocaleDateString('de-DE', {
            day: '2-digit', month: '2-digit', year: 'numeric'
          }) : '—';

        // Stats-Karten
        var html =
          '<div class="stats-grid">' +
            '<div class="stat-card glass">' +
              '<div class="stat-icon" style="background:rgba(88,86,214,0.12);color:var(--indigo);">&#128101;</div>' +
              '<div class="stat-value">' + stats.userCount + '</div>' +
              '<div class="stat-label">Nutzer gesamt</div>' +
            '</div>' +
            '<div class="stat-card glass">' +
              '<div class="stat-icon" style="background:rgba(48,209,88,0.12);color:var(--green);">&#10003;</div>' +
              '<div class="stat-value">' + activeCount + '</div>' +
              '<div class="stat-label">Aktiv</div>' +
            '</div>' +
            '<div class="stat-card glass">' +
              '<div class="stat-icon" style="background:rgba(255,59,48,0.12);color:var(--red);">&#128683;</div>' +
              '<div class="stat-value">' + suspendedCount + '</div>' +
              '<div class="stat-label">Gesperrt</div>' +
            '</div>' +
            '<div class="stat-card glass">' +
              '<div class="stat-icon" style="background:rgba(0,122,255,0.12);color:var(--blue);">&#128197;</div>' +
              '<div class="stat-value" style="font-size:20px;">' + newestDate + '</div>' +
              '<div class="stat-label">Letzte Registrierung</div>' +
            '</div>' +
          '</div>';

        // Nutzertabelle
        html +=
          '<h2 class="section-title">Alle Nutzer</h2>' +
          '<div class="user-table-wrap glass">' +
            '<table class="user-table">' +
              '<thead><tr>' +
                '<th>Nutzer</th>' +
                '<th>Rolle</th>' +
                '<th>Registriert</th>' +
                '<th>Daten</th>' +
                '<th>Aktion</th>' +
              '</tr></thead>' +
              '<tbody>';

        for (var i = 0; i < users.length; i++) {
          var u = users[i];
          var regDate = new Date(u.createdAt).toLocaleDateString('de-DE', {
            day: '2-digit', month: '2-digit', year: 'numeric'
          });

          var roleBadge = u.role === 'admin'
            ? '<span class="badge badge-admin">Admin</span>'
            : u.suspended
              ? '<span class="badge badge-suspended">Gesperrt</span>'
              : '<span class="badge badge-user">Nutzer</span>';

          var dataInfo = u._count.expenses + ' Ausg. · ' +
            u._count.incomes + ' Einn. · ' +
            u._count.categories + ' Kat.';

          var actionBtn = '';
          if (u.id === myId) {
            actionBtn = '<span style="color:var(--text-tertiary);font-size:12px;">Du</span>';
          } else if (u.role === 'admin') {
            actionBtn = '<button class="suspend-btn is-admin" disabled>Admin</button>';
          } else if (u.suspended) {
            actionBtn = '<button class="suspend-btn unsuspend" data-id="' + u.id + '" data-action="unsuspend">Entsperren</button>';
          } else {
            actionBtn = '<button class="suspend-btn suspend" data-id="' + u.id + '" data-action="suspend">Sperren</button>';
          }

          html +=
            '<tr>' +
              '<td><div class="user-name-cell">' +
                '<span class="user-name">' + escapeHtml(u.name) + '</span>' +
                '<span class="user-email">' + escapeHtml(u.email) + '</span>' +
              '</div></td>' +
              '<td>' + roleBadge + '</td>' +
              '<td style="font-size:13px;">' + regDate + '</td>' +
              '<td><span class="data-count">' + dataInfo + '</span></td>' +
              '<td>' + actionBtn + '</td>' +
            '</tr>';
        }

        html += '</tbody></table></div>';
        contentEl.innerHTML = html;

        // Event-Handler für Sperr-Buttons
        contentEl.addEventListener('click', async function (e) {
          var btn = e.target.closest('.suspend-btn[data-action]');
          if (!btn) return;

          var userId = btn.getAttribute('data-id');
          var action = btn.getAttribute('data-action');
          var suspend = action === 'suspend';

          var confirmMsg = suspend
            ? 'Nutzer wirklich sperren? Die aktive Sitzung wird sofort beendet.'
            : 'Nutzer wieder entsperren?';

          if (!confirm(confirmMsg)) return;

          btn.disabled = true;
          try {
            var res = await fetch('/api/admin/users/' + userId + '/suspend', {
              method: 'PATCH',
              credentials: 'include',
              headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': getCsrfToken() },
              body: JSON.stringify({ suspended: suspend }),
            });
            var data = await res.json();

            if (!res.ok) {
              showToast(data.error || 'Fehler', true);
              btn.disabled = false;
              return;
            }

            showToast(data.message);

            // Seite neu laden um Tabelle zu aktualisieren
            var newStatsRes = await fetch('/api/admin/stats');
            var newUsersRes = await fetch('/api/admin/users');
            var newStats = await newStatsRes.json();
            var newUsers = await newUsersRes.json();
            renderDashboard(newStats, newUsers.users, myId);
          } catch (err) {
            showToast('Netzwerkfehler', true);
            btn.disabled = false;
          }
        });
      }

      function escapeHtml(str) {
        var div = document.createElement('div');
        div.appendChild(document.createTextNode(str));
        return div.innerHTML;
      }

      function getCsrfToken() {
        var m = document.cookie.match(/(?:^|;\s*)csrf_token=([^;]*)/);
        return m ? m[1] : '';
      }

      function showToast(msg, isError) {
        var toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.style.background = isError
          ? 'rgba(255,59,48,0.18)'
          : 'rgba(48,209,88,0.18)';
        toast.style.color = isError ? 'var(--red)' : 'var(--green)';
        toast.classList.add('show');
        setTimeout(function () { toast.classList.remove('show'); }, 3000);
      }
    })();
  </script>
</body>

</html>

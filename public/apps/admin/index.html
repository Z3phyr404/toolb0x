<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Toolb0x — Administration</title>
  <style>
    /* ============================================================
   iOS 26 LIQUID GLASS — ADMIN
   ============================================================ */

    @font-face {
      font-family: 'SF';
      src: local('SF Pro Display'), local('SF Pro Text'), local('-apple-system'), local('BlinkMacSystemFont'), local('Helvetica Neue');
    }

    :root {
      --glass-bg: rgba(255, 255, 255, 0.12);
      --glass-bg-heavy: rgba(255, 255, 255, 0.18);
      --glass-border: rgba(255, 255, 255, 0.22);
      --glass-border-light: rgba(255, 255, 255, 0.12);
      --glass-shadow: 0 8px 40px rgba(0, 0, 0, 0.15), 0 2px 12px rgba(0, 0, 0, 0.1);
      --glass-shadow-elevated: 0 12px 60px rgba(0, 0, 0, 0.2), 0 4px 20px rgba(0, 0, 0, 0.15);
      --glass-inset: inset 0 1px 0 rgba(255, 255, 255, 0.25), inset 0 -1px 0 rgba(255, 255, 255, 0.05);
      --glass-blur: 40px;
      --glass-saturate: 1.8;

      --text: rgba(0, 0, 0, 0.85);
      --text-secondary: rgba(0, 0, 0, 0.55);
      --text-tertiary: rgba(0, 0, 0, 0.35);

      --blue: #007AFF;
      --green: #30D158;
      --red: #FF3B30;
      --orange: #FF9500;
      --purple: #AF52DE;
      --pink: #FF2D55;
      --teal: #5AC8FA;
      --indigo: #5856D6;
      --mint: #00C7BE;
      --yellow: #FFCC00;

      --radius-sm: 12px;
      --radius: 20px;
      --radius-lg: 26px;
      --radius-xl: 32px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      font-family: 'SF', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
      color: var(--text);
      overflow: hidden;
    }

    /* ===== ANIMATED BACKGROUND ===== */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: linear-gradient(135deg, #a8c8f0 0%, #d4b8e8 25%, #f0c8c8 50%, #b8d8f0 75%, #c8e8d0 100%);
      background-size: 400% 400%;
      animation: bgShift 20s ease infinite;
    }

    .bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 600px 600px at 20% 20%, rgba(168, 200, 240, 0.6), transparent),
        radial-gradient(ellipse 500px 500px at 80% 30%, rgba(212, 184, 232, 0.5), transparent),
        radial-gradient(ellipse 400px 400px at 50% 80%, rgba(184, 216, 240, 0.5), transparent);
    }

    @keyframes bgShift {
      0%, 100% { background-position: 0% 50%; }
      25% { background-position: 100% 0%; }
      50% { background-position: 100% 100%; }
      75% { background-position: 0% 100%; }
    }

    .glass {
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate));
      -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate));
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow), var(--glass-inset);
    }

    .glass-heavy {
      background: var(--glass-bg-heavy);
      backdrop-filter: blur(50px) saturate(2);
      -webkit-backdrop-filter: blur(50px) saturate(2);
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow-elevated), var(--glass-inset);
    }

    /* ===== LAYOUT ===== */
    .app {
      position: relative;
      z-index: 1;
      height: 100%;
      display: flex;
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      width: 260px;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      border-right: 1px solid var(--glass-border-light);
    }

    .sidebar-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.03em;
      padding: 8px 12px 16px;
    }

    .sidebar-title span {
      background: linear-gradient(135deg, var(--indigo), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .nav-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      text-decoration: none;
      cursor: pointer;
      border: none;
      background: none;
      font-family: inherit;
      transition: background 0.2s;
    }

    .nav-btn:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    .nav-btn.active {
      background: rgba(255, 255, 255, 0.18);
      font-weight: 600;
    }

    .nav-icon {
      font-size: 18px;
      width: 24px;
      text-align: center;
    }

    .sidebar-spacer {
      flex: 1;
    }

    .back-portal-btn {
      color: var(--text-secondary);
      font-size: 13px;
      margin-top: 8px;
    }

    /* ===== MAIN CONTENT ===== */
    .main {
      flex: 1;
      padding: 32px 40px;
      overflow-y: auto;
    }

    .page-header {
      margin-bottom: 32px;
    }

    .page-title {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .page-subtitle {
      font-size: 14px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    /* ===== STATS GRID ===== */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }

    .stat-card {
      border-radius: var(--radius-lg);
      padding: 28px 24px;
      text-align: center;
    }

    .stat-icon {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin: 0 auto 16px;
    }

    .stat-value {
      font-size: 42px;
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1;
      margin-bottom: 6px;
    }

    .stat-label {
      font-size: 14px;
      color: var(--text-secondary);
      font-weight: 500;
    }

    /* ===== INFO CARD ===== */
    .info-card {
      border-radius: var(--radius-lg);
      padding: 24px 28px;
      max-width: 480px;
    }

    .info-card-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--text);
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      font-size: 14px;
    }

    .info-row:not(:last-child) {
      border-bottom: 1px solid var(--glass-border-light);
    }

    .info-label {
      color: var(--text-secondary);
    }

    .info-value {
      font-weight: 600;
      color: var(--text);
    }

    /* ===== LOADING ===== */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 200px;
      color: var(--text-tertiary);
      font-size: 15px;
    }

    /* ===== MOBILE ===== */
    @media (max-width: 768px) {
      .sidebar {
        display: none;
      }

      .main {
        padding: 24px 16px;
      }

      .stats-grid {
        grid-template-columns: 1fr;
      }

      .stat-value {
        font-size: 36px;
      }

      .mobile-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 24px;
      }

      .mobile-back {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: var(--glass-bg);
        backdrop-filter: blur(20px);
        border: 1px solid var(--glass-border);
        text-decoration: none;
        font-size: 18px;
        color: var(--text);
      }
    }

    @media (min-width: 769px) {
      .mobile-header {
        display: none;
      }
    }
  </style>
</head>

<body>
  <div class="bg"></div>

  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar glass-heavy">
      <div class="sidebar-title"><span>Admin</span></div>

      <button class="nav-btn active" type="button">
        <span class="nav-icon">&#128202;</span> Übersicht
      </button>

      <div class="sidebar-spacer"></div>

      <a href="/portal" class="nav-btn back-portal-btn">
        &#8592; Zur Übersicht
      </a>
    </aside>

    <!-- Hauptbereich -->
    <main class="main">
      <!-- Mobile Header -->
      <div class="mobile-header">
        <a href="/portal" class="mobile-back">&#8592;</a>
        <h1 style="font-size:20px;font-weight:700;">Administration</h1>
      </div>

      <div class="page-header">
        <h1 class="page-title">Administration</h1>
        <p class="page-subtitle">System-Übersicht und Nutzerstatistiken</p>
      </div>

      <div id="content">
        <div class="loading">Lade Daten...</div>
      </div>
    </main>
  </div>

  <script nonce="__CSP_NONCE__" src="/shared/session-timeout.js"></script>
  <script nonce="__CSP_NONCE__">
    (async function () {
      // Auth prüfen + Admin-Check
      try {
        const meRes = await fetch('/api/auth/me');
        if (!meRes.ok) {
          window.location.href = '/portal';
          return;
        }
        const { user } = await meRes.json();
        if (user.role !== 'admin') {
          window.location.href = '/portal';
          return;
        }
      } catch {
        window.location.href = '/portal';
        return;
      }

      // Session-Timeout starten
      if (window.SessionTimeout) {
        SessionTimeout.start(() => {
          window.location.href = '/portal';
        });
      }

      // Admin-Stats laden
      try {
        const res = await fetch('/api/admin/stats');
        if (!res.ok) throw new Error('Fehler');
        const data = await res.json();

        const contentEl = document.getElementById('content');

        const newestDate = data.newestUser
          ? new Date(data.newestUser.createdAt).toLocaleDateString('de-DE', {
            day: '2-digit', month: '2-digit', year: 'numeric'
          })
          : '—';

        const newestName = data.newestUser ? data.newestUser.name : '—';

        contentEl.innerHTML =
          '<div class="stats-grid">' +
            '<div class="stat-card glass">' +
              '<div class="stat-icon" style="background:rgba(88,86,214,0.12);color:var(--indigo);">&#128101;</div>' +
              '<div class="stat-value">' + data.userCount + '</div>' +
              '<div class="stat-label">Registrierte Nutzer</div>' +
            '</div>' +
          '</div>' +
          '<div class="info-card glass">' +
            '<div class="info-card-title">Neuester Nutzer</div>' +
            '<div class="info-row">' +
              '<span class="info-label">Name</span>' +
              '<span class="info-value">' + newestName + '</span>' +
            '</div>' +
            '<div class="info-row">' +
              '<span class="info-label">Registriert am</span>' +
              '<span class="info-value">' + newestDate + '</span>' +
            '</div>' +
          '</div>';

      } catch {
        document.getElementById('content').innerHTML =
          '<div class="loading">Fehler beim Laden der Daten.</div>';
      }
    })();
  </script>
</body>

</html>

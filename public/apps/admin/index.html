<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Toolb0x — Administration</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared/obsidian.css">
  <style nonce="__CSP_NONCE__">
    /* ===== LAYOUT ===== */
    html, body { height: 100%; overflow: hidden; }

    .app {
      position: relative;
      z-index: 1;
      height: 100%;
      display: flex;
      overflow: hidden;
    }

    /* ===== GLOW ORBS ===== */
    .glow-orb {
      position: absolute;
      pointer-events: none;
      border-radius: 50%;
      transition: transform 0.35s cubic-bezier(0.2,0.8,0.2,1), background 0.5s ease;
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      position: relative;
      z-index: 1;
      width: 230px;
      flex-shrink: 0;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      border-right: 1px solid rgba(255,255,255,0.06);
      background: rgba(18,22,29,0.6);
    }

    .sidebar-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 6px 12px 18px;
    }

    .sidebar-brand-mark {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: linear-gradient(135deg,#a5b4fc,#6366f1);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 18px rgba(99,102,241,0.35);
    }

    .sidebar-brand-mark-inner {
      width: 13px;
      height: 13px;
      border: 2px solid #0f1030;
      border-radius: 4px;
    }

    .sidebar-brand-name {
      font-size: 19px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .nav-btn {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 11px 13px;
      border: 1px solid transparent;
      background: none;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      border-radius: var(--radius-btn);
      cursor: pointer;
      text-align: left;
      width: 100%;
      text-decoration: none;
      transition: color 0.2s, background 0.2s;
    }

    .nav-btn:hover {
      color: var(--text);
      background: rgba(255,255,255,0.05);
    }

    .nav-btn.active {
      border-color: rgba(129,140,248,0.25);
      background: rgba(129,140,248,0.12);
      font-weight: 600;
    }

    .nav-btn .nav-icon {
      color: #818cf8;
      display: flex;
    }

    .sidebar-spacer { flex: 1; }

    .back-portal-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: auto;
      padding: 10px 13px;
      font-size: 13px;
      color: var(--text-2);
      border-radius: 10px;
      text-decoration: none;
      transition: color 0.2s, background 0.2s;
    }

    .back-portal-btn:hover {
      color: var(--text);
      background: rgba(255,255,255,0.05);
    }

    /* ===== MAIN ===== */
    .main {
      position: relative;
      z-index: 1;
      flex: 1;
      padding: 34px 40px 40px;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .page-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.14em;
      color: rgba(129,140,248,0.9);
      margin-bottom: 8px;
    }

    .page-title {
      font-size: 34px;
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .page-subtitle {
      font-size: 14px;
      color: var(--text-2);
      margin-top: 6px;
    }

    .page-header {
      margin-bottom: 28px;
    }

    /* ===== STAT CARDS ===== */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px;
      transition: transform 0.25s, border-color 0.25s;
    }

    .stat-card:hover {
      transform: translateY(-2px);
    }

    .stat-card[data-accent="indigo"]:hover { border-color: rgba(129,140,248,0.3); }
    .stat-card[data-accent="green"]:hover { border-color: rgba(52,211,153,0.3); }
    .stat-card[data-accent="red"]:hover { border-color: rgba(255,107,96,0.3); }
    .stat-card[data-accent="blue"]:hover { border-color: rgba(56,189,248,0.3); }

    .stat-icon {
      width: 38px;
      height: 38px;
      border-radius: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
    }

    .stat-value {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .stat-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-mono);
      margin-top: 2px;
    }

    /* ===== USER TABLE ===== */
    .section-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 14px;
    }

    .user-table-wrap {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 8px 4px;
      overflow-x: auto;
      margin-bottom: 32px;
    }

    .user-table {
      width: 100%;
      border-collapse: collapse;
    }

    .user-table th {
      text-align: left;
      padding: 12px 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-mono);
      font-weight: 500;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .user-table th:last-child {
      text-align: right;
    }

    .user-table td {
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .user-table tr:last-child td {
      border-bottom: none;
    }

    .user-table tbody tr {
      transition: background 0.2s;
    }

    .user-table tbody tr:hover {
      background: rgba(255,255,255,0.03);
    }

    .user-name {
      font-size: 14px;
      font-weight: 600;
    }

    .user-email {
      font-size: 12px;
      color: var(--text-mono);
      margin-top: 2px;
    }

    .user-name-cell {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .data-count {
      font-size: 12px;
      color: var(--text-2);
    }

    .reg-date {
      font-size: 13px;
      color: rgba(238,241,246,0.7);
    }

    /* ===== ROLE PILLS ===== */
    .badge {
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 99px;
      white-space: nowrap;
    }

    .badge-admin {
      background: rgba(129,140,248,0.14);
      color: #a5b4fc;
    }

    .badge-user {
      background: rgba(52,211,153,0.14);
      color: #34d399;
    }

    .badge-suspended {
      background: rgba(255,59,48,0.14);
      color: #ff6b60;
    }

    /* ===== ACTION BUTTONS ===== */
    .action-cell {
      text-align: right;
    }

    .suspend-btn {
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      padding: 6px 13px;
      border-radius: 9px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .suspend-btn.suspend {
      border: 1px solid rgba(255,59,48,0.25);
      background: rgba(255,59,48,0.08);
      color: #ff6b60;
    }

    .suspend-btn.suspend:hover {
      background: rgba(255,59,48,0.16);
    }

    .suspend-btn.unsuspend {
      border: 1px solid rgba(52,211,153,0.25);
      background: rgba(52,211,153,0.08);
      color: #34d399;
    }

    .suspend-btn.unsuspend:hover {
      background: rgba(52,211,153,0.16);
    }

    .suspend-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .suspend-btn.is-admin {
      background: rgba(255,255,255,0.04);
      color: var(--text-3);
      border: 1px solid transparent;
      cursor: default;
    }

    .self-label {
      font-size: 12px;
      color: var(--text-3);
    }

    /* ===== TOAST ===== */
    .toast-box {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 300;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* ===== LOADING ===== */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 200px;
      color: var(--text-3);
      font-size: 15px;
    }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 8px; }

    /* ===== MOBILE ===== */
    @media (max-width: 768px) {
      .sidebar { display: none; }

      .main { padding: 24px 16px; }

      .stats-grid {
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .stat-card { padding: 16px; }
      .stat-value { font-size: 22px; }

      .mobile-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 24px;
      }

      .mobile-back {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: rgba(255,255,255,0.06);
        border: 1px solid var(--border);
        text-decoration: none;
        color: var(--text);
      }

      .mobile-back svg {
        width: 18px;
        height: 18px;
      }

      .user-table-wrap {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }

      .user-table { min-width: 600px; }

      .page-title { font-size: 26px; }
    }

    @media (min-width: 769px) {
      .mobile-header { display: none; }
    }
  </style>
</head>

<body>
  <div class="app" id="adminRoot">
    <!-- Glow Orbs -->
    <div class="glow-orb" data-glow data-glow-primary data-depth="55" style="position:absolute;top:-160px;right:-120px;width:600px;height:600px;background:radial-gradient(circle,rgba(129,140,248,0.22),transparent 70%);"></div>
    <div class="glow-orb" data-glow data-depth="30" style="position:absolute;bottom:-200px;left:100px;width:520px;height:520px;background:radial-gradient(circle,rgba(167,139,250,0.08),transparent 72%);"></div>

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="sidebar-brand-mark">
          <div class="sidebar-brand-mark-inner"></div>
        </div>
        <span class="sidebar-brand-name jitter">Admin</span>
      </div>

      <button class="nav-btn active" type="button">
        <span class="nav-icon"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 14l3-3 3 3 5-5"/></svg></span>
        Übersicht
      </button>

      <div class="sidebar-spacer"></div>

      <a href="/portal" class="back-portal-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Zur Übersicht
      </a>
    </aside>

    <!-- Main -->
    <main class="main">
      <!-- Mobile Header -->
      <div class="mobile-header">
        <a href="/portal" class="mobile-back">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </a>
        <h1 style="font-size:20px;font-weight:700;">Administration</h1>
      </div>

      <div class="page-header" data-reveal data-reveal-index="0">
        <div class="page-label">// ADMINISTRATION</div>
        <h1 class="page-title jitter">System-Übersicht</h1>
        <p class="page-subtitle">Nutzerverwaltung und System-Statistiken.</p>
      </div>

      <div id="content">
        <div class="loading">Lade Daten...</div>
      </div>
    </main>
  </div>

  <!-- Toast Container -->
  <div id="toastBox" class="toast-box"></div>

  <script nonce="__CSP_NONCE__" src="/shared/session-timeout.js"></script>
  <script nonce="__CSP_NONCE__" src="/shared/obsidian.js"></script>
  <script nonce="__CSP_NONCE__">
    (async function () {
      // Auth prüfen + Admin-Check
      try {
        var meRes = await fetch('/api/auth/me');
        if (!meRes.ok) { window.location.href = '/portal'; return; }
        var me = (await meRes.json()).user;
        if (me.role !== 'admin') { window.location.href = '/portal'; return; }
      } catch (e) {
        window.location.href = '/portal'; return;
      }

      // Session-Timeout starten
      if (window.SessionTimeout) {
        SessionTimeout.start(function () { window.location.href = '/portal'; });
      }

      // Daten laden
      try {
        var statsRes = await fetch('/api/admin/stats');
        var usersRes = await fetch('/api/admin/users');
        if (!statsRes.ok || !usersRes.ok) throw new Error('Fehler');
        var stats = await statsRes.json();
        var usersData = await usersRes.json();

        renderDashboard(stats, usersData.users, me.id);
      } catch (e) {
        document.getElementById('content').innerHTML =
          '<div class="loading">Fehler beim Laden der Daten.</div>';
      }

      function renderDashboard(stats, users, myId) {
        var contentEl = document.getElementById('content');
        var activeCount = users.filter(function (u) { return !u.suspended; }).length;
        var suspendedCount = users.filter(function (u) { return u.suspended; }).length;

        var newestDate = stats.newestUser
          ? new Date(stats.newestUser.createdAt).toLocaleDateString('de-DE', {
            day: '2-digit', month: '2-digit', year: 'numeric'
          }) : '—';

        // SVG Icons
        var iconUsers = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>';
        var iconCheck = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
        var iconBlock = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="4.9" y1="4.9" x2="19.1" y2="19.1"/></svg>';
        var iconCalendar = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>';

        // Stats-Karten
        var html =
          '<div class="stats-grid">' +
            '<div class="stat-card" data-reveal data-reveal-index="1" data-accent="indigo" data-glow-color="rgba(129,140,248,0.24)">' +
              '<div class="stat-icon" style="background:rgba(129,140,248,0.14);color:#818cf8;">' + iconUsers + '</div>' +
              '<div class="stat-value">' + stats.userCount + '</div>' +
              '<div class="stat-label">Nutzer gesamt</div>' +
            '</div>' +
            '<div class="stat-card" data-reveal data-reveal-index="2" data-accent="green" data-glow-color="rgba(52,211,153,0.24)">' +
              '<div class="stat-icon" style="background:rgba(52,211,153,0.14);color:#34d399;">' + iconCheck + '</div>' +
              '<div class="stat-value">' + activeCount + '</div>' +
              '<div class="stat-label">Aktiv</div>' +
            '</div>' +
            '<div class="stat-card" data-reveal data-reveal-index="3" data-accent="red" data-glow-color="rgba(255,107,96,0.24)">' +
              '<div class="stat-icon" style="background:rgba(255,59,48,0.14);color:#ff6b60;">' + iconBlock + '</div>' +
              '<div class="stat-value">' + suspendedCount + '</div>' +
              '<div class="stat-label">Gesperrt</div>' +
            '</div>' +
            '<div class="stat-card" data-reveal data-reveal-index="4" data-accent="blue" data-glow-color="rgba(56,189,248,0.24)">' +
              '<div class="stat-icon" style="background:rgba(56,189,248,0.14);color:#38bdf8;">' + iconCalendar + '</div>' +
              '<div class="stat-value" style="font-size:18px;">' + newestDate + '</div>' +
              '<div class="stat-label">Letzte Registrierung</div>' +
            '</div>' +
          '</div>';

        // Nutzertabelle
        html +=
          '<div data-reveal data-reveal-index="5" class="section-title">Alle Nutzer</div>' +
          '<div class="user-table-wrap" data-reveal data-reveal-index="6">' +
            '<table class="user-table">' +
              '<thead><tr>' +
                '<th>Nutzer</th>' +
                '<th>Rolle</th>' +
                '<th>Registriert</th>' +
                '<th>Daten</th>' +
                '<th>Aktion</th>' +
              '</tr></thead>' +
              '<tbody>';

        for (var i = 0; i < users.length; i++) {
          var u = users[i];
          var regDate = new Date(u.createdAt).toLocaleDateString('de-DE', {
            day: '2-digit', month: '2-digit', year: 'numeric'
          });

          var roleBadge = u.role === 'admin'
            ? '<span class="badge badge-admin">Admin</span>'
            : u.suspended
              ? '<span class="badge badge-suspended">Gesperrt</span>'
              : '<span class="badge badge-user">Nutzer</span>';

          var dataInfo = u._count.expenses + ' Ausg. · ' +
            u._count.incomes + ' Einn. · ' +
            u._count.categories + ' Kat.';

          var actionBtn = '';
          if (u.id === myId) {
            actionBtn = '<span class="self-label">Du</span>';
          } else if (u.role === 'admin') {
            actionBtn = '<button class="suspend-btn is-admin" disabled>Admin</button>';
          } else if (u.suspended) {
            actionBtn = '<button class="suspend-btn unsuspend" data-id="' + u.id + '" data-action="unsuspend">Entsperren</button>';
          } else {
            actionBtn = '<button class="suspend-btn suspend" data-id="' + u.id + '" data-action="suspend">Sperren</button>';
          }

          html +=
            '<tr>' +
              '<td><div class="user-name-cell">' +
                '<span class="user-name">' + escapeHtml(u.name) + '</span>' +
                '<span class="user-email">' + escapeHtml(u.email) + '</span>' +
              '</div></td>' +
              '<td>' + roleBadge + '</td>' +
              '<td><span class="reg-date">' + regDate + '</span></td>' +
              '<td><span class="data-count">' + dataInfo + '</span></td>' +
              '<td class="action-cell">' + actionBtn + '</td>' +
            '</tr>';
        }

        html += '</tbody></table></div>';
        contentEl.innerHTML = html;

        // Init Obsidian interactions nach Render
        var root = document.getElementById('adminRoot');
        if (typeof initGlow === 'function') initGlow(root);
        if (typeof initReveal === 'function') initReveal(root);

        // Event-Handler für Sperr-Buttons
        contentEl.addEventListener('click', async function (e) {
          var btn = e.target.closest('.suspend-btn[data-action]');
          if (!btn) return;

          var userId = btn.getAttribute('data-id');
          var action = btn.getAttribute('data-action');
          var suspend = action === 'suspend';

          var confirmMsg = suspend
            ? 'Nutzer wirklich sperren? Die aktive Sitzung wird sofort beendet.'
            : 'Nutzer wieder entsperren?';

          if (!confirm(confirmMsg)) return;

          btn.disabled = true;
          try {
            var res = await fetch('/api/admin/users/' + userId + '/suspend', {
              method: 'PATCH',
              credentials: 'include',
              headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': getCsrfToken() },
              body: JSON.stringify({ suspended: suspend }),
            });
            var data = await res.json();

            if (!res.ok) {
              showToast(data.error || 'Fehler', true);
              btn.disabled = false;
              return;
            }

            showToast(data.message);

            // Seite neu laden um Tabelle zu aktualisieren
            var newStatsRes = await fetch('/api/admin/stats');
            var newUsersRes = await fetch('/api/admin/users');
            var newStats = await newStatsRes.json();
            var newUsers = await newUsersRes.json();
            renderDashboard(newStats, newUsers.users, myId);
          } catch (err) {
            showToast('Netzwerkfehler', true);
            btn.disabled = false;
          }
        });
      }

      function escapeHtml(str) {
        var div = document.createElement('div');
        div.appendChild(document.createTextNode(str));
        return div.innerHTML;
      }

      function getCsrfToken() {
        var m = document.cookie.match(/(?:^|;\s*)csrf_token=([^;]*)/);
        return m ? m[1] : '';
      }

      function showToast(msg, isError) {
        var box = document.getElementById('toastBox');
        var toast = document.createElement('div');
        toast.className = 'ob-toast ' + (isError ? 'error' : 'success');
        toast.textContent = msg;
        box.appendChild(toast);
        setTimeout(function () { if (toast.parentNode) toast.parentNode.removeChild(toast); }, 3200);
      }
    })();
  </script>
</body>

</html>

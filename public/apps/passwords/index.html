<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Toolb0x — Passwort-Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared/obsidian.css">
  <style nonce="__CSP_NONCE__">
    /* ============================================================
       OBSIDIAN — PASSWORT-MANAGER
       ============================================================ */
    input[type=range] { accent-color:#fbbf24; }

    .pw-app {
      position: relative;
      min-height: 100vh;
      overflow: hidden;
      padding: 0 0 72px;
      opacity: 0;
      transition: opacity 0.4s;
    }
    .pw-app.active { opacity: 1; }

    /* ===== HEADER ===== */
    .pw-header {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 10%;
      border-bottom: 1px solid var(--border);
      background: rgba(18,22,29,0.6);
    }
    .pw-header-left {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .pw-back {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 13px;
      color: var(--text-3);
      transition: color 0.2s;
    }
    .pw-back:hover { color: var(--text); }
    .pw-brand {
      display: flex;
      align-items: center;
      gap: 11px;
    }
    .pw-logo {
      width: 32px;
      height: 32px;
      border-radius: 9px;
      background: linear-gradient(135deg,#fcd34d,#f59e0b);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 5px 16px rgba(245,158,11,0.35);
    }
    .pw-logo-inner {
      width: 12px;
      height: 12px;
      border: 2px solid #2a1c02;
      border-radius: 3px;
    }
    .pw-brand-name {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .pw-header-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .pw-user-name {
      font-size: 14px;
      font-weight: 500;
    }

    /* ===== MAIN ===== */
    .pw-main {
      position: relative;
      z-index: 1;
      padding: 34px 10%;
    }

    /* ===== GENERATOR CARD ===== */
    .gen-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 26px;
      margin-bottom: 28px;
    }
    .gen-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.14em;
      color: rgba(251,191,36,0.9);
      margin-bottom: 14px;
    }
    .gen-output-row {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--panel-inset);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 14px;
    }
    .gen-pw-text {
      flex: 1;
      font-family: 'JetBrains Mono', monospace;
      font-size: 19px;
      font-weight: 500;
      letter-spacing: 0.02em;
      color: #fcd34d;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      user-select: all;
      min-height: 28px;
      line-height: 1.5;
    }
    .gen-icon-btn {
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 9px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      flex-shrink: 0;
      color: rgba(238,241,246,0.7);
      background: rgba(255,255,255,0.05);
    }
    .gen-icon-btn:hover { background: rgba(255,255,255,0.12); }
    .gen-icon-btn.amber {
      background: rgba(251,191,36,0.12);
      color: #fbbf24;
    }
    .gen-icon-btn.amber:hover { background: rgba(251,191,36,0.2); }

    /* Strength */
    .strength-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }
    .strength-bar {
      flex: 1;
      height: 6px;
      border-radius: 3px;
      background: rgba(255,255,255,0.06);
      overflow: hidden;
    }
    .strength-fill {
      height: 100%;
      width: 0%;
      border-radius: 3px;
      transition: width 0.3s, background 0.3s;
    }
    .strength-label {
      font-size: 12px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      white-space: nowrap;
    }

    /* Slider */
    .gen-slider-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .gen-slider-label {
      font-size: 13px;
      color: rgba(238,241,246,0.7);
    }
    .gen-slider-label strong {
      color: var(--text);
    }
    .gen-slider {
      width: 100%;
      margin-bottom: 18px;
      cursor: pointer;
    }

    /* Toggle Grid */
    .toggle-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .toggle-pill {
      display: flex;
      align-items: center;
      gap: 9px;
      font-size: 13px;
      color: rgba(238,241,246,0.75);
      padding: 10px 12px;
      border: 1px solid rgba(251,191,36,0.25);
      background: rgba(251,191,36,0.08);
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .toggle-pill:hover {
      background: rgba(251,191,36,0.12);
    }
    .toggle-pill input[type="checkbox"] {
      accent-color: #fbbf24;
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }
    .toggle-pill.disabled {
      opacity: 0.4;
      pointer-events: none;
    }
    .toggle-pill.memorable {
      grid-column: span 2;
      border-color: rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.03);
      color: rgba(238,241,246,0.6);
    }

    .gen-save-btn {
      margin-top: 18px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 22px;
      border: none;
      border-radius: 11px;
      background: linear-gradient(135deg,#fcd34d,#f59e0b);
      color: #2a1c02;
      font-family: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(245,158,11,0.3);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .gen-save-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 26px rgba(245,158,11,0.42);
    }
    .gen-save-btn:active { transform: scale(0.98); }

    /* ===== SAVED PASSWORDS ===== */
    .saved-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 16px;
    }
    .saved-title {
      font-size: 18px;
      font-weight: 700;
    }
    .saved-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .search-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 12px;
    }
    .search-wrap svg { flex-shrink: 0; }
    .search-input {
      border: none;
      background: transparent;
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      outline: none;
      width: 130px;
    }
    .search-input::placeholder { color: var(--text-3); }
    .manual-btn {
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      padding: 9px 15px;
      border: 1px solid rgba(251,191,36,0.25);
      background: rgba(251,191,36,0.1);
      color: #fbbf24;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .manual-btn:hover { background: rgba(251,191,36,0.18); }

    /* Password Cards */
    .pw-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .pw-card {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px 20px;
      transition: border-color 0.25s, transform 0.2s;
    }
    .pw-card:hover {
      border-color: rgba(251,191,36,0.25);
      transform: translateY(-1px);
    }
    .pw-tile {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .pw-card-info {
      flex: 1;
      min-width: 0;
    }
    .pw-card-name {
      font-size: 15px;
      font-weight: 700;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .pw-card-meta {
      font-size: 12px;
      color: rgba(238,241,246,0.45);
      margin-top: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .pw-card-dots {
      font-family: 'JetBrains Mono', monospace;
      font-size: 16px;
      color: rgba(238,241,246,0.5);
      letter-spacing: 2px;
      white-space: nowrap;
    }
    .pw-card-plain {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      color: #fcd34d;
      word-break: break-all;
      display: none;
    }
    .pw-card-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }
    .pw-action-btn {
      width: 32px;
      height: 32px;
      border: none;
      border-radius: 8px;
      background: rgba(255,255,255,0.05);
      color: rgba(238,241,246,0.6);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, color 0.2s;
      flex-shrink: 0;
    }
    .pw-action-btn:hover {
      background: rgba(255,255,255,0.12);
      color: rgba(238,241,246,0.85);
    }
    .pw-action-btn.danger:hover {
      background: rgba(255,59,48,0.15);
      color: #ff6b60;
    }
    .pw-card-notes {
      font-size: 12px;
      color: var(--text-3);
      margin-top: 6px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ===== EMPTY STATE ===== */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
    }
    .empty-icon {
      width: 56px;
      height: 56px;
      margin: 0 auto 16px;
      border-radius: 14px;
      background: rgba(251,191,36,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .empty-title {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .empty-text {
      font-size: 13px;
      color: var(--text-2);
    }

    /* ===== MODALS ===== */
    .pw-modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
      padding: 20px;
    }
    .pw-modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }
    .pw-modal {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      padding: 28px;
      width: 100%;
      max-width: 440px;
      transform: scale(0.95) translateY(10px);
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
      max-height: 90vh;
      overflow-y: auto;
    }
    .pw-modal-overlay.open .pw-modal {
      transform: scale(1) translateY(0);
    }
    .pw-modal h3 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 20px;
    }
    .form-group {
      margin-bottom: 14px;
    }
    .form-label {
      display: block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--text-2);
      margin-bottom: 6px;
      text-transform: uppercase;
    }
    .form-input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius-btn);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    .form-input:focus {
      border-color: rgba(251,191,36,0.5);
      background: rgba(255,255,255,0.07);
    }
    .form-input::placeholder { color: var(--text-3); }
    .form-textarea {
      resize: vertical;
      min-height: 60px;
    }
    .pw-input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }
    .pw-input-wrap .form-input { padding-right: 42px; }
    .pw-toggle-vis {
      position: absolute;
      right: 6px;
      width: 30px;
      height: 30px;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: rgba(238,241,246,0.5);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .pw-toggle-vis:hover { background: rgba(255,255,255,0.08); }
    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    .modal-btn {
      flex: 1;
      padding: 11px 16px;
      border: none;
      border-radius: var(--radius-btn);
      font-family: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .modal-btn:active { transform: scale(0.98); }
    .modal-btn:hover { opacity: 0.88; }
    .modal-btn-cancel {
      background: rgba(255,255,255,0.06);
      color: var(--text-2);
    }
    .modal-btn-save {
      background: linear-gradient(135deg,#fcd34d,#f59e0b);
      color: #2a1c02;
    }
    .modal-btn-delete {
      background: rgba(255,59,48,0.15);
      color: #ff6b60;
    }
    .confirm-text {
      font-size: 14px;
      color: var(--text-2);
      margin-bottom: 8px;
      line-height: 1.5;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 600px) {
      .pw-header { padding: 16px 16px; gap: 10px; }
      .pw-header-left { gap: 12px; }
      .pw-main { padding: 20px 14px; }
      .gen-card { padding: 20px; }
      .gen-pw-text { font-size: 15px; }
      .toggle-grid { grid-template-columns: 1fr; }
      .toggle-pill.memorable { grid-column: span 1; }
      .saved-header { flex-direction: column; align-items: stretch; }
      .saved-actions { flex-wrap: wrap; }
      .search-input { width: 100%; }
      .pw-card { flex-wrap: wrap; gap: 12px; padding: 14px 16px; }
      .pw-card-dots, .pw-card-plain { width: 100%; }
    }
  </style>
</head>

<body>
  <!-- Loading -->
  <div class="ob-loading" id="loading"><div class="ob-spinner"></div></div>

  <div class="pw-app" id="app">
    <!-- Glow -->
    <div data-glow data-glow-primary data-depth="55" style="position:absolute;top:-160px;right:-120px;width:600px;height:600px;background:radial-gradient(circle,rgba(251,191,36,0.2),transparent 70%);pointer-events:none;transition:transform 0.35s cubic-bezier(0.2,0.8,0.2,1),background 0.5s ease;"></div>
    <div data-glow data-depth="30" style="position:absolute;bottom:-200px;left:-140px;width:520px;height:520px;background:radial-gradient(circle,rgba(255,146,32,0.07),transparent 72%);pointer-events:none;transition:transform 0.55s cubic-bezier(0.2,0.8,0.2,1);"></div>

    <!-- HEADER -->
    <header class="pw-header">
      <div class="pw-header-left">
        <a href="/portal" class="pw-back">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          Zur Übersicht
        </a>
        <div class="pw-brand">
          <div class="pw-logo"><div class="pw-logo-inner"></div></div>
          <span class="pw-brand-name jitter">Passwort-Manager</span>
        </div>
      </div>
      <div class="pw-header-right">
        <span class="pw-user-name" id="userName"></span>
        <button class="ob-btn-logout" id="logoutBtn">Abmelden</button>
      </div>
    </header>

    <!-- MAIN -->
    <main class="pw-main">

      <!-- ===== GENERATOR ===== -->
      <div class="gen-card" data-reveal data-reveal-index="0">
        <div class="gen-label">// GENERATOR</div>

        <div class="gen-output-row">
          <div class="gen-pw-text" id="pwOutput">&mdash;</div>
          <button class="gen-icon-btn" id="copyGenBtn" title="Kopieren">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          </button>
          <button class="gen-icon-btn amber" id="refreshBtn" title="Neu generieren">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          </button>
        </div>

        <div class="strength-row">
          <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
          <span class="strength-label" id="strengthLabel"></span>
        </div>

        <div class="gen-slider-row">
          <span class="gen-slider-label">Länge: <strong id="lengthValue">16</strong></span>
        </div>
        <input type="range" id="lengthSlider" min="8" max="128" value="16" class="gen-slider">

        <div class="toggle-grid">
          <label class="toggle-pill" id="lblUpper">
            <input type="checkbox" id="optUpper" checked> Großbuchstaben (A-Z)
          </label>
          <label class="toggle-pill" id="lblLower">
            <input type="checkbox" id="optLower" checked> Kleinbuchstaben (a-z)
          </label>
          <label class="toggle-pill" id="lblNumbers">
            <input type="checkbox" id="optNumbers" checked> Zahlen (0-9)
          </label>
          <label class="toggle-pill" id="lblSpecial">
            <input type="checkbox" id="optSpecial" checked> Sonderzeichen (!@#$)
          </label>
          <label class="toggle-pill memorable" id="lblMemorable">
            <input type="checkbox" id="optMemorable"> Merkbar (Passphrase)
          </label>
        </div>

        <button class="gen-save-btn" id="saveGenBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          Speichern
        </button>
      </div>

      <!-- ===== SAVED PASSWORDS ===== -->
      <div data-reveal data-reveal-index="1">
        <div class="saved-header">
          <h2 class="saved-title jitter">Gespeicherte Passwörter</h2>
          <div class="saved-actions">
            <div class="search-wrap">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="rgba(238,241,246,0.4)" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              <input type="text" id="searchInput" placeholder="Suchen..." class="search-input">
            </div>
            <button class="manual-btn" id="addManualBtn">+ Manuell</button>
          </div>
        </div>
      </div>

      <div class="pw-list" id="passwordList"></div>
      <div class="empty-state" id="emptyState" style="display:none">
        <div class="empty-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </div>
        <div class="empty-title">Noch keine Passwörter gespeichert</div>
        <div class="empty-text">Generiere ein Passwort oben und speichere es, oder füge eines manuell hinzu.</div>
      </div>
    </main>
  </div>

  <!-- ===== SAVE / EDIT MODAL ===== -->
  <div class="pw-modal-overlay" id="saveModal">
    <div class="pw-modal">
      <h3 id="modalTitle">Passwort speichern</h3>
      <div class="form-group">
        <label class="form-label">Bezeichnung *</label>
        <input class="form-input" id="modalName" type="text" placeholder="z.B. Netflix, Google..." maxlength="100">
      </div>
      <div class="form-group">
        <label class="form-label">Benutzername / E-Mail</label>
        <input class="form-input" id="modalUsername" type="text" placeholder="user@example.com" maxlength="200">
      </div>
      <div class="form-group">
        <label class="form-label">Passwort *</label>
        <div class="pw-input-wrap">
          <input class="form-input" id="modalPassword" type="password" maxlength="500">
          <button class="pw-toggle-vis" id="modalToggleVis" type="button">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Website</label>
        <input class="form-input" id="modalWebsite" type="text" placeholder="https://..." maxlength="500">
      </div>
      <div class="form-group">
        <label class="form-label">Notizen</label>
        <textarea class="form-input form-textarea" id="modalNotes" rows="3" maxlength="2000" placeholder="Optionale Notizen..."></textarea>
      </div>
      <div class="modal-actions">
        <button class="modal-btn modal-btn-cancel" id="modalCancel">Abbrechen</button>
        <button class="modal-btn modal-btn-save" id="modalSave">Speichern</button>
      </div>
    </div>
  </div>

  <!-- ===== DELETE CONFIRM MODAL ===== -->
  <div class="pw-modal-overlay" id="confirmModal">
    <div class="pw-modal">
      <h3>Passwort löschen?</h3>
      <p class="confirm-text" id="confirmText">Dieses Passwort wird unwiderruflich gelöscht.</p>
      <div class="modal-actions">
        <button class="modal-btn modal-btn-cancel" id="confirmCancel">Abbrechen</button>
        <button class="modal-btn modal-btn-delete" id="confirmDelete">Löschen</button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="ob-toast-box" id="toastBox"></div>

  <script nonce="__CSP_NONCE__" src="/shared/session-timeout.js"></script>
  <script nonce="__CSP_NONCE__" src="/shared/obsidian.js"></script>
  <script nonce="__CSP_NONCE__">
    /* ============================================================
       PASSWORT-MANAGER — JavaScript (Obsidian)
       ============================================================ */
    (function () {
      'use strict';

      var $ = function (id) { return document.getElementById(id); };
      var API = '/api';

      // --------------------------------------------------------
      // State
      // --------------------------------------------------------
      var allPasswords = [];
      var editingId = null;
      var deleteId = null;
      var currentGenerated = '';

      // --------------------------------------------------------
      // DOM refs
      // --------------------------------------------------------
      var pwOutput = $('pwOutput');
      var lengthSlider = $('lengthSlider');
      var lengthValue = $('lengthValue');
      var optUpper = $('optUpper');
      var optLower = $('optLower');
      var optNumbers = $('optNumbers');
      var optSpecial = $('optSpecial');
      var optMemorable = $('optMemorable');
      var strengthFill = $('strengthFill');
      var strengthLabel = $('strengthLabel');
      var passwordList = $('passwordList');
      var emptyState = $('emptyState');
      var searchInput = $('searchInput');

      var charLabels = [$('lblUpper'), $('lblLower'), $('lblNumbers'), $('lblSpecial')];

      // --------------------------------------------------------
      // Tile colors for letter-based avatars
      // --------------------------------------------------------
      var TILE_COLORS = [
        { bg: 'rgba(251,113,133,0.14)', fg: '#fb7185' },
        { bg: 'rgba(129,140,248,0.14)', fg: '#818cf8' },
        { bg: 'rgba(251,146,60,0.14)',  fg: '#fb923c' },
        { bg: 'rgba(52,211,153,0.14)',  fg: '#34d399' },
        { bg: 'rgba(251,191,36,0.14)',  fg: '#fbbf24' },
        { bg: 'rgba(96,165,250,0.14)',  fg: '#60a5fa' },
        { bg: 'rgba(167,139,250,0.14)', fg: '#a78bfa' },
        { bg: 'rgba(244,114,182,0.14)', fg: '#f472b6' }
      ];

      function tileColor(name) {
        var code = 0;
        for (var i = 0; i < name.length; i++) code += name.charCodeAt(i);
        return TILE_COLORS[code % TILE_COLORS.length];
      }

      // --------------------------------------------------------
      // Deutsche Wortliste für Passphrasen (~200 Wörter)
      // --------------------------------------------------------
      var WORDS = [
        'Apfel','Birne','Wolke','Stern','Mond','Fluss','Berg','Wald','Licht','Blume',
        'Regen','Wind','Stein','Feuer','Erde','Sonne','Tiger','Adler','Fuchs','Baum',
        'Blatt','Mauer','Turm','Krone','Perle','Feder','Pfeil','Schild','Tasse','Kerze',
        'Ampel','Anker','Asche','Bach','Biene','Blitz','Boden','Draht','Eiche','Engel',
        'Ernte','Fackel','Falke','Frost','Gabel','Garten','Geist','Glocke','Hafen','Hammer',
        'Harfe','Herbst','Hirsch','Honig','Igel','Insel','Juwel','Kabel','Kaktus','Kette',
        'Kiesel','Klang','Knopf','Kobalt','Korb','Lachs','Lampe','Lanze','Laube','Leine',
        'Linse','Luchs','Markt','Meise','Mitte','Morgen','Muschel','Nadel','Nebel','Nische',
        'Nixe','Oase','Olive','Orgel','Ozean','Palme','Pfad','Pflug','Pinie','Platz',
        'Prise','Puls','Quarz','Quelle','Rabe','Ranke','Raupe','Riegel','Rinne','Rubin',
        'Ruder','Sabel','Sattel','Schatz','Scholle','Segel','Silber','Sockel','Specht','Sprosse',
        'Staub','Storch','Strahl','Strom','Tempel','Tinte','Topas','Traube','Truhe','Tulpe',
        'Ufer','Ulme','Veilchen','Vlies','Wabe','Wachtel','Weide','Welle','Wolke','Wurzel',
        'Zange','Zeder','Ziegel','Zinne','Zobel','Zweig','Amber','Basalt','Brise','Delphin',
        'Diamant','Distel','Dolch','Drossel','Eiland','Elster','Falter','Fasan','Fichte','Finke',
        'Forelle','Granit','Grille','Halm','Hering','Hummel','Jasmin','Kauz','Klippe','Kompass',
        'Kranich','Kristall','Laterne','Lerche','Linde','Lotus','Marmor','Mohn','Murmeln','Natter',
        'Nuss','Otter','Panther','Pelikan','Pythia','Quaste','Reiter','Riff','Saphir','Schakal',
        'Schwalbe','Smaragd','Sperber','Spinne','Splitter','Taube','Topf','Uhu','Viper','Wiesel',
        'Zephyr','Zinke','Zitrone','Ahorn','Distel','Falke','Granat','Haken','Jaspis','Kupfer'
      ];

      // --------------------------------------------------------
      // CSPRNG-Helfer
      // --------------------------------------------------------
      function secureRandom(max) {
        var arr = new Uint32Array(1);
        crypto.getRandomValues(arr);
        return arr[0] % max;
      }

      // --------------------------------------------------------
      // Passwort-Generator
      // --------------------------------------------------------
      var CHARSETS = {
        upper: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
        lower: 'abcdefghijklmnopqrstuvwxyz',
        numbers: '0123456789',
        special: '!@#$%^&*()_+-=[]{}|;:,.<>?'
      };

      function generatePassword() {
        var len = parseInt(lengthSlider.value);

        if (optMemorable.checked) {
          return generatePassphrase(len);
        }

        var pool = '';
        if (optUpper.checked) pool += CHARSETS.upper;
        if (optLower.checked) pool += CHARSETS.lower;
        if (optNumbers.checked) pool += CHARSETS.numbers;
        if (optSpecial.checked) pool += CHARSETS.special;

        if (!pool) {
          pool = CHARSETS.lower;
          optLower.checked = true;
        }

        var values = new Uint32Array(len);
        crypto.getRandomValues(values);

        var pw = '';
        for (var i = 0; i < len; i++) {
          pw += pool[values[i] % pool.length];
        }
        return pw;
      }

      function generatePassphrase(targetLen) {
        var wordCount = Math.max(3, Math.min(8, Math.ceil(targetLen / 7)));
        var values = new Uint32Array(wordCount);
        crypto.getRandomValues(values);
        var words = [];
        for (var i = 0; i < wordCount; i++) {
          words.push(WORDS[values[i] % WORDS.length]);
        }
        return words.join('-');
      }

      // --------------------------------------------------------
      // Stärke berechnen
      // --------------------------------------------------------
      function calcStrength(pw) {
        var score = 0;
        var len = pw.length;
        if (len >= 8) score++;
        if (len >= 12) score++;
        if (len >= 16) score++;
        if (len >= 24) score++;
        if (/[a-z]/.test(pw)) score++;
        if (/[A-Z]/.test(pw)) score++;
        if (/[0-9]/.test(pw)) score++;
        if (/[^a-zA-Z0-9]/.test(pw)) score++;

        if (score <= 2) return { pct: 25, label: 'Schwach', color: '#ff6b60' };
        if (score <= 4) return { pct: 50, label: 'Mittel', color: '#fbbf24' };
        if (score <= 6) return { pct: 75, label: 'Stark', color: '#34d399' };
        return { pct: 100, label: 'Sehr stark', color: '#34d399' };
      }

      function updatePassword() {
        currentGenerated = generatePassword();
        pwOutput.textContent = currentGenerated;
        var s = calcStrength(currentGenerated);
        strengthFill.style.width = s.pct + '%';
        strengthFill.style.background = s.pct >= 75 ? 'linear-gradient(90deg,#34d399,#10b981)' : s.color;
        strengthLabel.textContent = s.label;
        strengthLabel.style.color = s.color;
      }

      // --------------------------------------------------------
      // Zwischenablage
      // --------------------------------------------------------
      function copyToClipboard(text) {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(function () {
            toast('In Zwischenablage kopiert');
            autoClear(text);
          }).catch(function () {
            fallbackCopy(text);
          });
        } else {
          fallbackCopy(text);
        }
      }

      function fallbackCopy(text) {
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.style.cssText = 'position:fixed;opacity:0';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        toast('Kopiert');
      }

      function autoClear(text) {
        setTimeout(function () {
          try {
            navigator.clipboard.readText().then(function (cur) {
              if (cur === text) navigator.clipboard.writeText('');
            }).catch(function () {});
          } catch (e) {}
        }, 30000);
      }

      // --------------------------------------------------------
      // Toast
      // --------------------------------------------------------
      function toast(msg, type) {
        type = type || 'success';
        var el = document.createElement('div');
        el.className = 'ob-toast ' + type;
        el.textContent = (type === 'success' ? '\u2713 ' : '\u2717 ') + msg;
        $('toastBox').appendChild(el);
        setTimeout(function () { el.remove(); }, 3200);
      }

      // --------------------------------------------------------
      // HTML-Escape
      // --------------------------------------------------------
      function esc(s) {
        if (!s) return '';
        var d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
      }

      // --------------------------------------------------------
      // SVG Icons (stroke line icons)
      // --------------------------------------------------------
      var ICONS = {
        eye: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>',
        eyeOff: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>',
        copy: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>',
        edit: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>',
        trash: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>'
      };

      // --------------------------------------------------------
      // API-Helfer
      // --------------------------------------------------------
      function getCsrfToken() {
        var m = document.cookie.match(/(?:^|;\s*)csrf_token=([^;]*)/);
        return m ? m[1] : '';
      }

      function api(endpoint, options) {
        options = options || {};
        var headers = { 'Content-Type': 'application/json', 'X-CSRF-Token': getCsrfToken() };
        if (options.headers) {
          for (var k in options.headers) headers[k] = options.headers[k];
        }
        options.headers = headers;
        options.credentials = 'include';
        return fetch(API + endpoint, options).then(function (res) {
          if (res.status === 401 || res.status === 403) {
            window.location.href = '/portal';
            throw new Error('auth');
          }
          return res.json().then(function (data) {
            if (!res.ok) throw new Error(data.error || (data.errors && data.errors[0]) || 'Fehler');
            return data;
          });
        });
      }

      // --------------------------------------------------------
      // CRUD
      // --------------------------------------------------------
      function loadPasswords() {
        return api('/passwords').then(function (data) {
          allPasswords = data.passwords || [];
          renderList();
        }).catch(function (err) {
          if (err.message !== 'auth') toast('Laden fehlgeschlagen', 'error');
        });
      }

      function savePassword(payload) {
        var method = editingId ? 'PUT' : 'POST';
        var url = editingId ? '/passwords/' + editingId : '/passwords';
        return api(url, { method: method, body: JSON.stringify(payload) });
      }

      function deletePassword(id) {
        return api('/passwords/' + id, { method: 'DELETE' });
      }

      // --------------------------------------------------------
      // Render Passwort-Liste
      // --------------------------------------------------------
      function renderList() {
        var query = searchInput.value.toLowerCase().trim();
        var filtered = allPasswords;
        if (query) {
          filtered = allPasswords.filter(function (p) {
            return p.name.toLowerCase().indexOf(query) !== -1 ||
                   p.username.toLowerCase().indexOf(query) !== -1 ||
                   p.website.toLowerCase().indexOf(query) !== -1;
          });
        }

        if (filtered.length === 0) {
          passwordList.innerHTML = '';
          emptyState.style.display = '';
          return;
        }

        emptyState.style.display = 'none';
        var revealIdx = 2;
        passwordList.innerHTML = filtered.map(function (p) {
          var meta = [];
          if (p.username) meta.push(esc(p.username));
          if (p.website) meta.push(esc(p.website));
          var letter = (p.name || '?')[0].toUpperCase();
          var tc = tileColor(p.name || '');
          var idx = revealIdx++;
          return '<div class="pw-card" data-reveal data-reveal-index="' + idx + '" data-glow-color="' + tc.bg.replace('0.14', '0.2') + '" data-id="' + p.id + '">' +
            '<div class="pw-tile" style="background:' + tc.bg + ';color:' + tc.fg + ';">' + letter + '</div>' +
            '<div class="pw-card-info">' +
              '<div class="pw-card-name">' + esc(p.name) + '</div>' +
              (meta.length ? '<div class="pw-card-meta">' + meta.join(' &middot; ') + '</div>' : '') +
            '</div>' +
            '<span class="pw-card-dots" data-dots="' + p.id + '">' + '\u2022'.repeat(10) + '</span>' +
            '<span class="pw-card-plain" data-plain="' + p.id + '">' + esc(p.password) + '</span>' +
            '<div class="pw-card-actions">' +
              '<button class="pw-action-btn" data-reveal-pw="' + p.id + '" title="Anzeigen">' + ICONS.eye + '</button>' +
              '<button class="pw-action-btn" data-copy="' + p.id + '" title="Kopieren">' + ICONS.copy + '</button>' +
              '<button class="pw-action-btn" data-edit="' + p.id + '" title="Bearbeiten">' + ICONS.edit + '</button>' +
              '<button class="pw-action-btn danger" data-del="' + p.id + '" title="Löschen">' + ICONS.trash + '</button>' +
            '</div>' +
          '</div>';
        }).join('');

        // Re-init reveal for new cards
        initReveal(document.getElementById('app'));
      }

      // --------------------------------------------------------
      // Event: Password list actions (delegation)
      // --------------------------------------------------------
      passwordList.addEventListener('click', function (e) {
        var btn;

        // Reveal / Hide
        btn = e.target.closest('[data-reveal-pw]');
        if (btn) {
          var id = btn.dataset.revealPw;
          var dots = document.querySelector('[data-dots="' + id + '"]');
          var plain = document.querySelector('[data-plain="' + id + '"]');
          if (dots && plain) {
            var showing = plain.style.display !== 'none';
            dots.style.display = showing ? '' : 'none';
            plain.style.display = showing ? 'none' : '';
            btn.innerHTML = showing ? ICONS.eye : ICONS.eyeOff;
          }
          return;
        }

        // Copy
        btn = e.target.closest('[data-copy]');
        if (btn) {
          var pw = allPasswords.find(function (p) { return p.id === btn.dataset.copy; });
          if (pw) copyToClipboard(pw.password);
          return;
        }

        // Edit
        btn = e.target.closest('[data-edit]');
        if (btn) {
          openEditModal(btn.dataset.edit);
          return;
        }

        // Delete
        btn = e.target.closest('[data-del]');
        if (btn) {
          deleteId = btn.dataset.del;
          var pw2 = allPasswords.find(function (p) { return p.id === deleteId; });
          $('confirmText').textContent = '"' + (pw2 ? pw2.name : 'Passwort') + '" wird unwiderruflich gelöscht.';
          $('confirmModal').classList.add('open');
          return;
        }
      });

      // --------------------------------------------------------
      // Modals
      // --------------------------------------------------------
      function openSaveModal(pw) {
        editingId = null;
        $('modalTitle').textContent = 'Passwort speichern';
        $('modalName').value = '';
        $('modalUsername').value = '';
        $('modalPassword').value = pw || '';
        $('modalPassword').type = 'password';
        $('modalWebsite').value = '';
        $('modalNotes').value = '';
        $('saveModal').classList.add('open');
        $('modalName').focus();
      }

      function openEditModal(id) {
        var entry = allPasswords.find(function (p) { return p.id === id; });
        if (!entry) return;
        editingId = id;
        $('modalTitle').textContent = 'Passwort bearbeiten';
        $('modalName').value = entry.name;
        $('modalUsername').value = entry.username || '';
        $('modalPassword').value = entry.password;
        $('modalPassword').type = 'password';
        $('modalWebsite').value = entry.website || '';
        $('modalNotes').value = entry.notes || '';
        $('saveModal').classList.add('open');
        $('modalName').focus();
      }

      function closeModals() {
        $('saveModal').classList.remove('open');
        $('confirmModal').classList.remove('open');
      }

      // Modal: Save
      $('modalSave').addEventListener('click', function () {
        var name = $('modalName').value.trim();
        var password = $('modalPassword').value;
        if (!name) { toast('Bitte Bezeichnung eingeben', 'error'); return; }
        if (!password) { toast('Bitte Passwort eingeben', 'error'); return; }

        var payload = {
          name: name,
          password: password,
          username: $('modalUsername').value.trim(),
          website: $('modalWebsite').value.trim(),
          notes: $('modalNotes').value.trim()
        };

        savePassword(payload).then(function () {
          closeModals();
          toast(editingId ? 'Passwort aktualisiert' : 'Passwort gespeichert');
          loadPasswords();
        }).catch(function (err) {
          toast(err.message || 'Speichern fehlgeschlagen', 'error');
        });
      });

      $('modalCancel').addEventListener('click', closeModals);
      $('modalToggleVis').addEventListener('click', function () {
        var inp = $('modalPassword');
        inp.type = inp.type === 'password' ? 'text' : 'password';
      });

      // Modal: Delete confirm
      $('confirmDelete').addEventListener('click', function () {
        if (!deleteId) return;
        deletePassword(deleteId).then(function () {
          closeModals();
          toast('Passwort gelöscht');
          deleteId = null;
          loadPasswords();
        }).catch(function (err) {
          toast(err.message || 'Löschen fehlgeschlagen', 'error');
        });
      });
      $('confirmCancel').addEventListener('click', closeModals);

      // Close modals on overlay click
      document.querySelectorAll('.pw-modal-overlay').forEach(function (overlay) {
        overlay.addEventListener('click', function (e) {
          if (e.target === overlay) closeModals();
        });
      });

      // Close modals on Escape
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') closeModals();
      });

      // --------------------------------------------------------
      // Generator Controls
      // --------------------------------------------------------
      lengthSlider.addEventListener('input', function () {
        lengthValue.textContent = lengthSlider.value;
        updatePassword();
      });

      [optUpper, optLower, optNumbers, optSpecial].forEach(function (cb) {
        cb.addEventListener('change', updatePassword);
      });

      optMemorable.addEventListener('change', function () {
        var isMemorable = optMemorable.checked;
        charLabels.forEach(function (lbl) {
          if (isMemorable) lbl.classList.add('disabled');
          else lbl.classList.remove('disabled');
        });
        updatePassword();
      });

      $('refreshBtn').addEventListener('click', updatePassword);
      $('copyGenBtn').addEventListener('click', function () {
        if (currentGenerated) copyToClipboard(currentGenerated);
      });

      $('saveGenBtn').addEventListener('click', function () {
        if (currentGenerated) openSaveModal(currentGenerated);
      });

      $('addManualBtn').addEventListener('click', function () {
        openSaveModal('');
      });

      // Search
      searchInput.addEventListener('input', renderList);

      // --------------------------------------------------------
      // Logout
      // --------------------------------------------------------
      $('logoutBtn').addEventListener('click', function () {
        fetch(API + '/auth/logout', { method: 'POST', credentials: 'include' })
          .finally(function () { window.location.href = '/portal'; });
      });

      // --------------------------------------------------------
      // Init
      // --------------------------------------------------------
      function initApp() {
        if (SessionTimeout.wasRestarted()) {
          fetch(API + '/auth/logout', { method: 'POST', credentials: 'include' }).catch(function () {});
          window.location.href = '/portal';
          return;
        }

        api('/auth/me').then(function (data) {
          $('userName').textContent = data.user.name;
          return loadPasswords();
        }).then(function () {
          var appEl = $('app');
          appEl.classList.add('active');
          $('loading').classList.add('hidden');
          updatePassword();

          // Init Obsidian interactions
          initGlow(appEl);
          initReveal(appEl);

          SessionTimeout.start(function () { window.location.href = '/portal'; });
        }).catch(function () {
          window.location.href = '/portal';
        });
      }

      initApp();
    })();
  </script>
</body>

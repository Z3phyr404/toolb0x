<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Toolb0x — Notizen</title>
  <link rel="stylesheet" href="/shared/obsidian.css" nonce="__CSP_NONCE__">
  <style nonce="__CSP_NONCE__">
    /* ============================================================
       OBSIDIAN DARK — NOTIZEN APP
       ============================================================ */

    html, body {
      height: 100%;
      overflow: hidden;
    }

    ::-webkit-scrollbar { width: 9px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 8px; }

    /* ===== LOADING ===== */
    .loading-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(18,22,29,0.85);
      backdrop-filter: blur(20px);
      transition: opacity 0.3s;
    }

    .loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #a78bfa;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    /* ===== APP LAYOUT ===== */
    .app {
      position: relative;
      z-index: 1;
      display: flex;
      height: 100vh;
      height: 100dvh;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s;
    }

    .app.active {
      opacity: 1;
      pointer-events: all;
    }

    /* Glow orbs */
    .glow-orb {
      position: absolute;
      pointer-events: none;
      transition: transform 0.35s cubic-bezier(0.2,0.8,0.2,1), background 0.5s ease;
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      position: relative;
      z-index: 1;
      width: 268px;
      flex-shrink: 0;
      padding: 20px 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      border-right: 1px solid rgba(255,255,255,0.06);
      background: rgba(18,22,29,0.6);
    }

    .back-portal-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 13px;
      color: var(--text-3);
      padding: 6px 10px;
      border-radius: 9px;
      transition: color 0.2s, background 0.2s;
      text-decoration: none;
    }

    .back-portal-btn:hover {
      color: var(--text);
      background: rgba(255,255,255,0.05);
    }

    .sidebar-logo-wrap {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 8px 10px 14px;
    }

    .sidebar-logo-icon {
      width: 32px;
      height: 32px;
      border-radius: 9px;
      background: linear-gradient(135deg,#c4b5fd,#8b5cf6);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 5px 16px rgba(139,92,246,0.35);
      flex-shrink: 0;
    }

    .sidebar-logo-icon-inner {
      width: 12px;
      height: 12px;
      border: 2px solid #1a0f33;
      border-radius: 3px;
    }

    .sidebar-logo-text {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .sidebar-logo-text:hover {
      animation: jitter 0.4s ease;
      cursor: default;
    }

    /* Search */
    .sidebar-search {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--panel-inset);
      border: 1px solid var(--border);
      border-radius: var(--radius-btn);
      padding: 9px 12px;
      margin-bottom: 8px;
    }

    .sidebar-search input {
      border: none;
      background: transparent;
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      outline: none;
      width: 100%;
    }

    .sidebar-search input::placeholder {
      color: var(--text-3);
    }

    /* Section label */
    .nav-group-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(238,241,246,0.32);
      padding: 8px 10px 4px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* Tree */
    .sidebar-tree-wrap {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 0 2px;
    }

    .sidebar-tree-wrap::-webkit-scrollbar {
      width: 4px;
    }

    .sidebar-tree-wrap::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
    }

    .tree-item {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 9px 11px;
      border-radius: 9px;
      cursor: pointer;
      transition: background 0.2s;
      font-size: 14px;
      color: rgba(238,241,246,0.7);
      position: relative;
      user-select: none;
    }

    .tree-item:hover {
      background: rgba(255,255,255,0.05);
      color: rgba(238,241,246,0.8);
    }

    .tree-item.active {
      background: rgba(167,139,250,0.12);
      border: 1px solid rgba(167,139,250,0.22);
      color: var(--text);
      font-weight: 600;
    }

    .tree-toggle {
      width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--text-3);
      font-size: 13px;
      transition: transform 0.2s;
      cursor: pointer;
      border-radius: 4px;
    }

    .tree-toggle:hover {
      background: rgba(255,255,255,0.05);
    }

    .tree-toggle.expanded {
      transform: rotate(90deg);
    }

    .tree-toggle.invisible {
      visibility: hidden;
    }

    .tree-icon {
      font-size: 15px;
      flex-shrink: 0;
      width: 20px;
      text-align: center;
    }

    .tree-label {
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tree-actions {
      display: none;
      align-items: center;
      gap: 2px;
      flex-shrink: 0;
    }

    .tree-item:hover .tree-actions {
      display: flex;
    }

    .tree-action-btn {
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: none;
      color: var(--text-3);
      cursor: pointer;
      border-radius: 4px;
      font-size: 14px;
      transition: all 0.15s;
    }

    .tree-action-btn:hover {
      background: rgba(255,255,255,0.08);
      color: var(--text);
    }

    .tree-children {
      padding-left: 16px;
      overflow: hidden;
    }

    .tree-children.collapsed {
      display: none;
    }

    /* New page button */
    .sidebar-new-btn {
      margin-top: 10px;
      padding: 11px;
      border: 1px dashed rgba(167,139,250,0.35);
      background: rgba(167,139,250,0.06);
      color: #a78bfa;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      border-radius: var(--radius-btn);
      cursor: pointer;
      transition: background 0.2s;
    }

    .sidebar-new-btn:hover {
      background: rgba(167,139,250,0.14);
    }

    /* Archive section */
    .sidebar-archive-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 10px;
      color: var(--text-3);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      background: none;
      font-family: inherit;
      transition: color 0.2s;
      width: 100%;
      text-align: left;
    }

    .sidebar-archive-toggle:hover {
      color: var(--text-2);
    }

    .sidebar-archive-toggle .arrow {
      font-size: 10px;
      transition: transform 0.2s;
    }

    .sidebar-archive-toggle .arrow.expanded {
      transform: rotate(90deg);
    }

    .sidebar-archive-list {
      display: none;
      padding: 0 2px;
    }

    .sidebar-archive-list.show {
      display: block;
    }

    .archive-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      font-size: 13px;
      color: var(--text-3);
      border-radius: 9px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .archive-item:hover {
      background: rgba(255,255,255,0.05);
      color: var(--text-2);
    }

    .archive-item-actions {
      display: none;
      gap: 2px;
      margin-left: auto;
    }

    .archive-item:hover .archive-item-actions {
      display: flex;
    }

    /* Sidebar User */
    .sidebar-user {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 8px 4px;
      margin-top: auto;
    }

    .sidebar-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #232b37;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #a9bccd;
      font-size: 13px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .sidebar-user-info {
      flex: 1;
      min-width: 0;
    }

    .sidebar-user-name {
      font-size: 13px;
      font-weight: 600;
    }

    .sidebar-user-email {
      font-size: 11px;
      color: var(--text-3);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sidebar-logout {
      background: none;
      border: none;
      color: var(--text-3);
      cursor: pointer;
      padding: 4px;
      display: flex;
      transition: color 0.2s;
    }

    .sidebar-logout:hover {
      color: #ff8a70;
    }

    .sidebar-logout svg {
      width: 17px;
      height: 17px;
    }

    /* ===== MAIN CONTENT ===== */
    main {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 32px 44px;
    }

    .editor-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 720px;
      margin: 0 auto;
      width: 100%;
      overflow: hidden;
    }

    /* Breadcrumbs */
    .breadcrumbs {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text-3);
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .breadcrumb-item {
      cursor: pointer;
      transition: color 0.15s;
    }

    .breadcrumb-item:hover {
      color: #a78bfa;
    }

    .breadcrumb-sep {
      color: rgba(238,241,246,0.25);
    }

    .breadcrumb-current {
      color: rgba(167,139,250,0.9);
    }

    /* Title area */
    .note-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 22px;
    }

    .note-icon-btn {
      font-size: 36px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      border-radius: 8px;
      transition: background 0.15s;
      line-height: 1;
    }

    .note-icon-btn:hover {
      background: rgba(255,255,255,0.05);
    }

    .note-title-input {
      flex: 1;
      font-size: 34px;
      font-weight: 700;
      letter-spacing: -0.03em;
      background: none;
      border: none;
      outline: none;
      font-family: 'Space Grotesk', system-ui, sans-serif;
      color: var(--text);
      min-width: 0;
    }

    .note-title-input:hover {
      animation: jitter 0.45s ease;
    }

    .note-title-input::placeholder {
      color: var(--text-3);
    }

    .note-header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      margin-left: auto;
    }

    .save-status {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: rgba(52,211,153,0.9);
    }

    .header-btn {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      border-radius: 8px;
      background: rgba(255,255,255,0.05);
      color: rgba(238,241,246,0.6);
      cursor: pointer;
      font-size: 16px;
      transition: background 0.2s;
    }

    .header-btn:hover {
      background: rgba(255,255,255,0.12);
    }

    .header-btn.pinned {
      color: #a78bfa;
      background: rgba(167,139,250,0.12);
    }

    /* Editor Toolbar */
    .editor-toolbar {
      display: flex;
      align-items: center;
      gap: 2px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 6px;
      margin-bottom: 22px;
      flex-wrap: wrap;
    }

    .toolbar-btn {
      min-width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      border-radius: 7px;
      background: transparent;
      color: rgba(238,241,246,0.75);
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      transition: background 0.2s;
    }

    .toolbar-btn:hover {
      background: rgba(255,255,255,0.08);
    }

    .toolbar-btn.active {
      background: rgba(167,139,250,0.15);
      color: #a78bfa;
    }

    .toolbar-sep {
      width: 1px;
      height: 20px;
      background: rgba(255,255,255,0.1);
      margin: 0 6px;
    }

    .toolbar-btn-code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
    }

    /* WYSIWYG Editor */
    .editor-content {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0 40px;
      outline: none;
      font-size: 15px;
      line-height: 1.7;
      color: rgba(238,241,246,0.85);
      min-height: 200px;
    }

    .editor-content:empty::before {
      content: 'Beginne zu schreiben...';
      color: var(--text-3);
      pointer-events: none;
    }

    .editor-content::-webkit-scrollbar {
      width: 6px;
    }

    .editor-content::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.08);
      border-radius: 3px;
    }

    /* Editor content styles */
    .editor-content h1 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin: 24px 0 8px;
      color: var(--text);
    }

    .editor-content h2 {
      font-size: 20px;
      font-weight: 700;
      margin: 20px 0 12px;
      color: var(--text);
    }

    .editor-content h3 {
      font-size: 16px;
      font-weight: 700;
      margin: 20px 0 10px;
      color: var(--text);
    }

    .editor-content p {
      margin: 0 0 16px;
    }

    .editor-content strong {
      color: var(--text);
    }

    .editor-content ul,
    .editor-content ol {
      margin: 4px 0 16px 22px;
      color: rgba(238,241,246,0.8);
    }

    .editor-content li {
      margin: 0 0 8px;
    }

    .editor-content blockquote {
      border-left: 3px solid rgba(167,139,250,0.6);
      margin: 16px 0;
      padding: 4px 0 4px 16px;
      color: rgba(238,241,246,0.6);
      font-style: italic;
    }

    .editor-content code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: #fbbf24;
      background: rgba(251,191,36,0.1);
      padding: 2px 6px;
      border-radius: 5px;
    }

    .editor-content pre {
      background: var(--panel-inset);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 18px;
      margin: 8px 0 16px;
      overflow-x: auto;
    }

    .editor-content pre code {
      background: none;
      padding: 0;
      color: #a78bfa;
      font-size: 13px;
      line-height: 1.9;
    }

    .editor-content a {
      color: #a78bfa;
      text-decoration: underline;
      text-decoration-color: rgba(167,139,250,0.3);
      text-underline-offset: 2px;
    }

    .editor-content hr {
      border: none;
      height: 1px;
      background: var(--border);
      margin: 16px 0;
    }

    .editor-content img {
      max-width: 100%;
      border-radius: 12px;
    }

    /* ===== EMPTY STATE ===== */
    .empty-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .empty-state-inner {
      text-align: center;
      max-width: 360px;
      padding: 48px 32px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
    }

    .empty-state-icon {
      font-size: 56px;
      margin-bottom: 16px;
    }

    .empty-state-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .empty-state-text {
      font-size: 14px;
      color: var(--text-2);
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .empty-state-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      border: none;
      border-radius: var(--radius-btn);
      background: linear-gradient(135deg,#c4b5fd,#8b5cf6);
      color: #fff;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      box-shadow: 0 5px 16px rgba(139,92,246,0.35);
    }

    .empty-state-btn:hover {
      opacity: 0.9;
    }

    .empty-state-btn:active {
      transform: scale(0.97);
    }

    /* ===== EMOJI PICKER ===== */
    .emoji-picker {
      position: absolute;
      z-index: 50;
      padding: 12px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      display: none;
      max-width: 280px;
    }

    .emoji-picker.show {
      display: block;
    }

    .emoji-picker-grid {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 4px;
    }

    .emoji-pick {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: none;
      font-size: 18px;
      cursor: pointer;
      border-radius: 6px;
      transition: background 0.12s;
    }

    .emoji-pick:hover {
      background: rgba(255,255,255,0.08);
    }

    /* ===== CONTEXT MENU ===== */
    .context-menu {
      position: fixed;
      z-index: 100;
      min-width: 180px;
      padding: 6px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-btn);
      display: none;
    }

    .context-menu.show {
      display: block;
    }

    .context-menu-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border: none;
      background: none;
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      border-radius: 8px;
      width: 100%;
      text-align: left;
      transition: background 0.12s;
    }

    .context-menu-item:hover {
      background: rgba(255,255,255,0.06);
    }

    .context-menu-item.danger {
      color: var(--error-text);
    }

    .context-menu-sep {
      height: 1px;
      background: var(--border);
      margin: 4px 6px;
    }

    /* ===== LINK MODAL ===== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 120;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      width: 100%;
      max-width: 420px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      padding: 28px;
    }

    .modal h3 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .form-group {
      margin-bottom: 14px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-2);
      margin-bottom: 6px;
    }

    .form-input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius-btn);
      background: var(--panel-inset);
      font-family: inherit;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    .form-input:focus {
      border-color: #a78bfa;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 20px;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: var(--radius-btn);
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn-secondary {
      background: rgba(255,255,255,0.06);
      color: var(--text-2);
    }

    .btn-primary {
      background: linear-gradient(135deg,#c4b5fd,#8b5cf6);
      color: #fff;
    }

    .btn:hover {
      opacity: 0.85;
    }

    /* ===== CONFIRM MODAL ===== */
    .confirm-text {
      font-size: 14px;
      color: var(--text-2);
      line-height: 1.5;
      margin-bottom: 8px;
    }

    .btn-danger {
      background: var(--error-btn);
      color: #fff;
    }

    /* ===== SEARCH RESULTS ===== */
    .search-result {
      padding: 8px 10px;
      border-radius: 9px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .search-result:hover {
      background: rgba(255,255,255,0.05);
    }

    .search-result-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .search-result-snippet {
      font-size: 12px;
      color: var(--text-3);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ===== TOAST ===== */
    .toast-box {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 150;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast {
      padding: 12px 20px;
      border-radius: var(--radius-btn);
      font-size: 13px;
      font-weight: 500;
      animation: toastIn 0.3s;
      backdrop-filter: blur(12px);
    }

    .toast.error {
      background: rgba(255,59,48,0.12);
      border: 1px solid rgba(255,59,48,0.2);
      color: var(--error-text);
    }

    .toast.success {
      background: rgba(52,211,153,0.12);
      border: 1px solid rgba(52,211,153,0.2);
      color: var(--success);
    }

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: none; }
    }

    /* ===== DRAG INDICATOR ===== */
    .tree-item.drag-over {
      background: rgba(167,139,250,0.12);
      border: 1px dashed #a78bfa;
    }

    .tree-item.dragging {
      opacity: 0.4;
    }

    /* ===== MOBILE ===== */
    .mobile-toggle {
      display: none;
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 60;
      width: 40px;
      height: 40px;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      border-radius: var(--radius-btn);
      background: var(--panel);
      color: var(--text);
      font-size: 20px;
      cursor: pointer;
    }

    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9;
      background: rgba(0,0,0,0.5);
    }

    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        z-index: 10;
        transform: translateX(-100%);
        transition: transform 0.3s;
        width: 268px;
        background: var(--bg);
      }

      .sidebar.open {
        transform: translateX(0);
      }

      .sidebar-overlay.show {
        display: block;
      }

      .mobile-toggle {
        display: flex;
      }

      main {
        padding: 16px;
        padding-top: 64px;
      }

      .note-header {
        gap: 10px;
      }

      .note-title-input {
        font-size: 24px;
      }
    }

    /* ===== HIDDEN UTILITY ===== */
    .hidden {
      display: none !important;
    }
  </style>
</head>

<body>

  <script nonce="__CSP_NONCE__" src="/shared/session-timeout.js"></script>
  <script nonce="__CSP_NONCE__" src="/shared/obsidian.js"></script>
  <script nonce="__CSP_NONCE__">
    // ============================================================
    // NOTIZEN APP — Vanilla JS (Obsidian Dark)
    // ============================================================

    const API = '/api';

    // ---- State ----
    let allNotes = [];
    let currentNote = null;
    let currentUser = null;
    let saveTimer = null;
    let expandedNodes = {};
    let archiveOpen = false;
    let searchMode = false;
    let draggedId = null;
    let confirmCallback = null;
    let savedSelection = null;

    // ---- DOM ----
    const $ = id => document.getElementById(id);
    const app = $('app');
    const loading = $('loading');
    const editorWrap = $('editorWrap');
    const emptyState = $('emptyState');
    const editorContent = $('editorContent');
    const noteTitleInput = $('noteTitleInput');
    const noteIconBtn = $('noteIconBtn');
    const pinBtn = $('pinBtn');
    const saveStatus = $('saveStatus');
    const breadcrumbs = $('breadcrumbs');
    const searchInput = $('searchInput');
    const pageTree = $('pageTree');
    const pinnedTree = $('pinnedTree');
    const pinnedSection = $('pinnedSection');
    const pagesSection = $('pagesSection');
    const searchResults = $('searchResults');
    const archiveSection = $('archiveSection');
    const archiveList = $('archiveList');
    const emojiPicker = $('emojiPicker');
    const contextMenu = $('contextMenu');
    const toastBox = $('toastBox');

    // ---- Emojis ----
    const EMOJIS = [
      '\u{1F4C4}','\u{1F4DD}','\u{1F4CB}','\u{1F4CC}','\u{1F4CE}','\u{1F4C2}','\u{1F4C1}','\u{1F5C2}\uFE0F',
      '\u{1F310}','\u{1F4BB}','\u{1F5A5}\uFE0F','\u{1F4F1}','\u{1F527}','\u2699\uFE0F','\u{1F6E0}\uFE0F','\u{1F529}',
      '\u{1F3A8}','\u{1F3AF}','\u{1F680}','\u2728','\u{1F4A1}','\u{1F512}','\u{1F511}','\u{1F6E1}\uFE0F',
      '\u{1F4CA}','\u{1F4C8}','\u{1F4C9}','\u{1F5C3}\uFE0F','\u{1F4BE}','\u2601\uFE0F','\u{1F50C}','\u{1F4E1}',
      '\u{1F41B}','\u{1F9EA}','\u{1F4E6}','\u{1F3D7}\uFE0F','\u{1F9E9}','\u{1F50D}','\u{1F4D0}','\u{1F5D3}\uFE0F',
    ];

    // ============================================================
    // API Helper
    // ============================================================
    function getCsrfToken() {
      const m = document.cookie.match(/(?:^|;\s*)csrf_token=([^;]*)/);
      return m ? m[1] : '';
    }

    async function api(endpoint, options = {}) {
      const res = await fetch(API + endpoint, {
        credentials: 'include',
        headers: { 'Content-Type': 'application/json', 'X-CSRF-Token': getCsrfToken(), ...options.headers },
        ...options,
      });
      if (res.status === 401 || res.status === 403) {
        window.location.href = '/portal';
        throw new Error('auth');
      }
      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        throw new Error(data.error || data.errors?.[0] || 'Fehler');
      }
      return res.json();
    }

    // ============================================================
    // Toast
    // ============================================================
    function toast(msg, type = 'error') {
      const el = document.createElement('div');
      el.className = `toast ${type}`;
      el.textContent = msg;
      toastBox.appendChild(el);
      setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 3000);
    }

    // ============================================================
    // Init
    // ============================================================
    async function initApp() {
      try {
        if (typeof SessionTimeout !== 'undefined' && SessionTimeout.wasRestarted()) {
          await fetch(API + '/auth/logout', { method: 'POST', credentials: 'include' }).catch(() => {});
          throw new Error('browser-restart');
        }
        const { user } = await api('/auth/me');
        currentUser = user;
        $('userName').textContent = user.name;
        $('userEmail').textContent = user.email;
        $('userAvatar').textContent = user.name.charAt(0).toUpperCase();

        // Expand state from localStorage
        try { expandedNodes = JSON.parse(localStorage.getItem('notizen_expanded') || '{}'); } catch { expandedNodes = {}; }

        await loadNotes();
        app.classList.add('active');
        loading.classList.add('hidden');

        // Init Obsidian glow + reveal
        initGlow(app);
        initReveal(app);

        if (typeof SessionTimeout !== 'undefined') {
          SessionTimeout.start(() => { window.location.href = '/portal'; });
        }
      } catch (err) {
        window.location.href = '/portal';
      }
    }

    // ============================================================
    // Load Notes
    // ============================================================
    async function loadNotes() {
      const { notes } = await api('/notes');
      allNotes = notes;
      renderSidebar();
    }

    // ============================================================
    // Render Sidebar
    // ============================================================
    function renderSidebar() {
      const active = allNotes.filter(n => !n.isArchived);
      const archived = allNotes.filter(n => n.isArchived);
      const pinned = active.filter(n => n.isPinned);
      const unpinned = active.filter(n => !n.isPinned);

      // Pinned section
      if (pinned.length > 0) {
        pinnedSection.classList.remove('hidden');
        pinnedTree.innerHTML = '';
        pinned.forEach(n => {
          pinnedTree.appendChild(createTreeItem(n, 0, true));
        });
      } else {
        pinnedSection.classList.add('hidden');
      }

      // Page tree
      const roots = unpinned.filter(n => !n.parentId || !active.find(p => p.id === n.parentId));
      pageTree.innerHTML = '';
      if (roots.length === 0 && pinned.length === 0) {
        emptyState.style.display = '';
        editorWrap.style.display = 'none';
        if (!currentNote) return;
      }
      roots.sort((a, b) => a.sortOrder - b.sortOrder || new Date(a.createdAt) - new Date(b.createdAt));
      roots.forEach(n => renderTreeNode(n, pageTree, 0, active));

      // Archive section
      if (archived.length > 0) {
        archiveSection.classList.remove('hidden');
        archiveList.innerHTML = '';
        archived.forEach(n => {
          const el = document.createElement('div');
          el.className = 'archive-item';
          el.innerHTML = `<span class="tree-icon">${n.icon || '\u{1F4C4}'}</span>
            <span class="tree-label">${esc(n.title || 'Ohne Titel')}</span>
            <div class="archive-item-actions">
              <button class="tree-action-btn" data-restore="${n.id}" title="Wiederherstellen">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
              </button>
              <button class="tree-action-btn" data-permdelete="${n.id}" title="Endgültig löschen" style="color:var(--error-text)">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
              </button>
            </div>`;
          archiveList.appendChild(el);
        });
      } else {
        archiveSection.classList.add('hidden');
      }
    }

    function renderTreeNode(note, container, depth, activeNotes) {
      const children = activeNotes
        .filter(n => n.parentId === note.id && !n.isPinned)
        .sort((a, b) => a.sortOrder - b.sortOrder || new Date(a.createdAt) - new Date(b.createdAt));
      const hasChildren = children.length > 0;
      const isExpanded = expandedNodes[note.id] !== false;

      const item = createTreeItem(note, depth, false, hasChildren, isExpanded);
      container.appendChild(item);

      if (hasChildren) {
        const childWrap = document.createElement('div');
        childWrap.className = 'tree-children' + (isExpanded ? '' : ' collapsed');
        childWrap.dataset.parentId = note.id;
        children.forEach(c => renderTreeNode(c, childWrap, depth + 1, activeNotes));
        container.appendChild(childWrap);
      }
    }

    function createTreeItem(note, depth, isPinnedView, hasChildren, isExpanded) {
      const el = document.createElement('div');
      el.className = 'tree-item' + (currentNote && currentNote.id === note.id ? ' active' : '');
      el.dataset.id = note.id;
      el.draggable = true;

      const toggleChar = hasChildren
        ? (isExpanded ? '\u25BE' : '\u25B8')
        : '';
      const toggle = hasChildren
        ? `<span class="tree-toggle ${isExpanded ? 'expanded' : ''}" data-toggle="${note.id}" style="font-size:13px;color:var(--text-3);">${toggleChar}</span>`
        : `<span class="tree-toggle invisible"></span>`;

      el.innerHTML = `${toggle}
        <span class="tree-icon">${note.icon || '\u{1F4C4}'}</span>
        <span class="tree-label">${esc(note.title || 'Ohne Titel')}</span>
        <div class="tree-actions">
          <button class="tree-action-btn" data-addchild="${note.id}" title="Unterseite">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
          <button class="tree-action-btn" data-ctxmenu="${note.id}" title="Mehr">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>
          </button>
        </div>`;

      return el;
    }

    // ============================================================
    // Open Note
    // ============================================================
    async function openNote(id) {
      try {
        const { note } = await api(`/notes/${id}`);
        currentNote = note;

        emptyState.style.display = 'none';
        editorWrap.style.display = '';

        noteTitleInput.value = note.title || '';
        noteIconBtn.textContent = note.icon || '\u{1F4C4}';
        editorContent.innerHTML = note.content || '';
        pinBtn.classList.toggle('pinned', note.isPinned);

        renderBreadcrumbs(note);
        highlightActive(note.id);
        saveStatus.textContent = '';

        // Close mobile sidebar
        $('sidebar').classList.remove('open');
        $('sidebarOverlay').classList.remove('show');
      } catch (err) {
        toast('Notiz konnte nicht geladen werden.');
      }
    }

    function highlightActive(id) {
      document.querySelectorAll('.tree-item').forEach(el => {
        el.classList.toggle('active', el.dataset.id === id);
      });
    }

    function renderBreadcrumbs(note) {
      const chain = [];
      let current = note;
      while (current) {
        chain.unshift(current);
        current = allNotes.find(n => n.id === current.parentId);
      }
      breadcrumbs.innerHTML = chain.map((n, i) => {
        const isLast = i === chain.length - 1;
        return (i > 0 ? '<span class="breadcrumb-sep">/</span>' : '') +
          (isLast
            ? `<span class="breadcrumb-item breadcrumb-current">${esc(n.title || 'Ohne Titel')}</span>`
            : `<span class="breadcrumb-item" data-nav="${n.id}">${esc(n.title || 'Ohne Titel')}</span>`);
      }).join('');
    }

    // ============================================================
    // Create Note
    // ============================================================
    async function createNote(parentId) {
      try {
        const { note } = await api('/notes', {
          method: 'POST',
          body: JSON.stringify({ title: 'Neue Seite', content: '', parentId: parentId || null }),
        });
        allNotes.push({ ...note, content: undefined });
        if (parentId) {
          expandedNodes[parentId] = true;
          saveExpandState();
        }
        renderSidebar();
        await openNote(note.id);
        noteTitleInput.focus();
        noteTitleInput.select();
      } catch (err) {
        toast('Seite konnte nicht erstellt werden.');
      }
    }

    // ============================================================
    // Save Note (Auto-Save)
    // ============================================================
    function scheduleAutoSave() {
      if (!currentNote) return;
      clearTimeout(saveTimer);
      saveStatus.textContent = 'Änderungen…';
      saveTimer = setTimeout(saveNote, 1500);
    }

    async function saveNote() {
      if (!currentNote) return;
      clearTimeout(saveTimer);
      saveStatus.textContent = 'Speichert…';
      try {
        const { note } = await api(`/notes/${currentNote.id}`, {
          method: 'PUT',
          body: JSON.stringify({
            title: noteTitleInput.value || 'Ohne Titel',
            content: editorContent.innerHTML,
            icon: currentNote.icon || '',
          }),
        });
        currentNote = note;
        // Update in allNotes
        const idx = allNotes.findIndex(n => n.id === note.id);
        if (idx >= 0) {
          allNotes[idx] = { ...allNotes[idx], title: note.title, icon: note.icon, updatedAt: note.updatedAt };
        }
        renderSidebar();
        saveStatus.textContent = '\u2713 Gespeichert';
        setTimeout(() => { if (saveStatus.textContent === '\u2713 Gespeichert') saveStatus.textContent = ''; }, 2000);
      } catch (err) {
        saveStatus.textContent = 'Fehler beim Speichern';
        toast('Speichern fehlgeschlagen.');
      }
    }

    // ============================================================
    // Delete Note
    // ============================================================
    async function deleteNote(id) {
      try {
        await api(`/notes/${id}`, { method: 'DELETE' });
        // Remove from allNotes (incl. children)
        removeNoteAndChildren(id);
        if (currentNote && currentNote.id === id) {
          currentNote = null;
          editorWrap.style.display = 'none';
          emptyState.style.display = allNotes.filter(n => !n.isArchived).length === 0 ? '' : 'none';
          if (allNotes.filter(n => !n.isArchived).length > 0) {
            // Open first available
            const first = allNotes.find(n => !n.isArchived);
            if (first) await openNote(first.id);
          } else {
            emptyState.style.display = '';
          }
        }
        renderSidebar();
        toast('Gelöscht.', 'success');
      } catch (err) {
        toast('Löschen fehlgeschlagen.');
      }
    }

    function removeNoteAndChildren(id) {
      const children = allNotes.filter(n => n.parentId === id);
      children.forEach(c => removeNoteAndChildren(c.id));
      allNotes = allNotes.filter(n => n.id !== id);
    }

    // ============================================================
    // Pin / Archive
    // ============================================================
    async function togglePin(id) {
      try {
        const { note } = await api(`/notes/${id}/pin`, { method: 'PUT' });
        const idx = allNotes.findIndex(n => n.id === id);
        if (idx >= 0) allNotes[idx].isPinned = note.isPinned;
        if (currentNote && currentNote.id === id) {
          currentNote.isPinned = note.isPinned;
          pinBtn.classList.toggle('pinned', note.isPinned);
        }
        renderSidebar();
      } catch (err) {
        toast('Fehler beim Pinnen.');
      }
    }

    async function toggleArchive(id) {
      try {
        await api(`/notes/${id}/archive`, { method: 'PUT' });
        // Reload to get accurate state
        await loadNotes();
        if (currentNote && currentNote.id === id) {
          currentNote = null;
          editorWrap.style.display = 'none';
          const first = allNotes.find(n => !n.isArchived);
          if (first) await openNote(first.id);
          else emptyState.style.display = '';
        }
        toast('Archiviert.', 'success');
      } catch (err) {
        toast('Archivierung fehlgeschlagen.');
      }
    }

    async function restoreNote(id) {
      try {
        await api(`/notes/${id}/archive`, { method: 'PUT' });
        await loadNotes();
        toast('Wiederhergestellt.', 'success');
      } catch (err) {
        toast('Wiederherstellen fehlgeschlagen.');
      }
    }

    // ============================================================
    // Move Note (Drag & Drop)
    // ============================================================
    async function moveNote(id, newParentId, newSort) {
      try {
        await api(`/notes/${id}/move`, {
          method: 'PUT',
          body: JSON.stringify({ parentId: newParentId, sortOrder: newSort }),
        });
        await loadNotes();
        if (currentNote) highlightActive(currentNote.id);
      } catch (err) {
        toast(err.message || 'Verschieben fehlgeschlagen.');
      }
    }

    // ============================================================
    // Search
    // ============================================================
    let searchTimer = null;
    function doSearch(q) {
      clearTimeout(searchTimer);
      if (!q.trim()) {
        exitSearch();
        return;
      }
      searchTimer = setTimeout(async () => {
        try {
          const { results } = await api(`/notes/search?q=${encodeURIComponent(q)}`);
          searchMode = true;
          pinnedSection.classList.add('hidden');
          pagesSection.classList.add('hidden');
          archiveSection.classList.add('hidden');
          searchResults.classList.remove('hidden');
          searchResults.innerHTML = results.length > 0
            ? `<div class="nav-group-label">ERGEBNISSE (${results.length})</div>` +
              results.map(r => `<div class="search-result" data-nav="${r.id}">
                <div class="search-result-title"><span>${r.icon || '\u{1F4C4}'}</span> ${esc(r.title)}</div>
                ${r.snippet ? `<div class="search-result-snippet">${esc(r.snippet)}</div>` : ''}
              </div>`).join('')
            : '<div style="padding:16px;text-align:center;color:var(--text-3);font-size:13px">Keine Ergebnisse</div>';
        } catch (err) {
          toast('Suche fehlgeschlagen.');
        }
      }, 300);
    }

    function exitSearch() {
      searchMode = false;
      searchResults.classList.add('hidden');
      searchResults.innerHTML = '';
      pinnedSection.classList.remove('hidden');
      pagesSection.classList.remove('hidden');
      renderSidebar();
    }

    // ============================================================
    // Emoji Picker
    // ============================================================
    function showEmojiPicker(anchorEl) {
      const grid = $('emojiGrid');
      grid.innerHTML = EMOJIS.map(e => `<button class="emoji-pick">${e}</button>`).join('');
      const rect = anchorEl.getBoundingClientRect();
      emojiPicker.style.left = rect.left + 'px';
      emojiPicker.style.top = (rect.bottom + 6) + 'px';
      emojiPicker.classList.add('show');
    }

    function hideEmojiPicker() {
      emojiPicker.classList.remove('show');
    }

    // ============================================================
    // Context Menu
    // ============================================================
    function showContextMenu(noteId, x, y) {
      const note = allNotes.find(n => n.id === noteId);
      if (!note) return;

      contextMenu.innerHTML = `
        <button class="context-menu-item" data-action="addchild" data-id="${noteId}">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Unterseite
        </button>
        <button class="context-menu-item" data-action="pin" data-id="${noteId}">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 17v5"/><path d="M9 11l-4 4"/><path d="M15 11l4 4"/><path d="M5 15l7-7 7 7"/></svg>
          ${note.isPinned ? 'Entpinnen' : 'Anpinnen'}
        </button>
        <div class="context-menu-sep"></div>
        <button class="context-menu-item" data-action="archive" data-id="${noteId}">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="5" rx="1"/><path d="M4 8v11a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8"/><path d="M10 12h4"/></svg>
          Archivieren
        </button>
        <button class="context-menu-item danger" data-action="delete" data-id="${noteId}">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          Löschen
        </button>`;

      contextMenu.style.left = Math.min(x, window.innerWidth - 200) + 'px';
      contextMenu.style.top = Math.min(y, window.innerHeight - 200) + 'px';

    }

    function hideContextMenu() {
      contextMenu.classList.remove('show');
    }

    // ============================================================
    // Confirm Dialog
    // ============================================================
    function showConfirm(title, text, btnText, cb) {
      $('confirmTitle').textContent = title;
      $('confirmText').textContent = text;
      $('confirmOk').textContent = btnText;
      confirmCallback = cb;
      $('confirmModal').classList.add('open');
    }

    // ============================================================
    // Toolbar Commands
    // ============================================================
    function execCmd(cmd, val) {
      editorContent.focus();
      if (cmd === 'formatBlock') {
        document.execCommand('formatBlock', false, val);
      } else {
        document.execCommand(cmd, false, val || null);
      }
      scheduleAutoSave();
    }

    function insertCode() {
      const sel = window.getSelection();
      if (!sel.rangeCount) return;
      const range = sel.getRangeAt(0);
      const code = document.createElement('code');
      if (range.collapsed) {
        code.textContent = 'code';
        range.insertNode(code);
        // Place cursor after
        range.setStartAfter(code);
        range.collapse(true);
        sel.removeAllRanges();
        sel.addRange(range);
      } else {
        code.textContent = range.toString();
        range.deleteContents();
        range.insertNode(code);
      }
      scheduleAutoSave();
    }

    function insertCodeBlock() {
      const sel = window.getSelection();
      if (!sel.rangeCount) return;
      const range = sel.getRangeAt(0);
      const pre = document.createElement('pre');
      const code = document.createElement('code');
      code.textContent = range.toString() || 'Code hier eingeben...';
      pre.appendChild(code);
      range.deleteContents();
      range.insertNode(pre);
      // Add empty paragraph after
      const p = document.createElement('p');
      p.innerHTML = '<br>';
      pre.parentNode.insertBefore(p, pre.nextSibling);
      scheduleAutoSave();
    }

    function openLinkModal() {
      savedSelection = saveSelection();
      const sel = window.getSelection();
      $('linkText').value = sel.toString() || '';
      $('linkUrl').value = '';
      $('linkModal').classList.add('open');
      $('linkUrl').focus();
    }

    function insertLink() {
      const text = $('linkText').value || $('linkUrl').value;
      const url = $('linkUrl').value;
      if (!url) return;

      $('linkModal').classList.remove('open');
      editorContent.focus();

      if (savedSelection) restoreSelection(savedSelection);

      const sel = window.getSelection();
      if (!sel.rangeCount) return;
      const range = sel.getRangeAt(0);
      range.deleteContents();

      const a = document.createElement('a');
      a.href = url;
      a.textContent = text;
      a.target = '_blank';
      a.rel = 'noopener';
      range.insertNode(a);

      range.setStartAfter(a);
      range.collapse(true);
      sel.removeAllRanges();
      sel.addRange(range);
      scheduleAutoSave();
    }

    function saveSelection() {
      const sel = window.getSelection();
      if (sel.rangeCount > 0) return sel.getRangeAt(0).cloneRange();
      return null;
    }

    function restoreSelection(range) {
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
    }

    // ============================================================
    // Expand/Collapse helpers
    // ============================================================
    function toggleExpand(noteId) {
      expandedNodes[noteId] = expandedNodes[noteId] === false ? true : (expandedNodes[noteId] ? false : false);
      // If it was undefined (first time), default was expanded, so toggle to collapsed
      if (expandedNodes[noteId] === undefined) expandedNodes[noteId] = false;
      saveExpandState();
      renderSidebar();
    }

    function saveExpandState() {
      try { localStorage.setItem('notizen_expanded', JSON.stringify(expandedNodes)); } catch {}
    }

    // ============================================================
    // HTML Escape
    // ============================================================
    function esc(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    // ============================================================
    // Event Delegation
    // ============================================================
    document.addEventListener('click', async (e) => {
      // Hide popups
      if (!e.target.closest('.emoji-picker') && !e.target.closest('.note-icon-btn')) hideEmojiPicker();
      if (!e.target.closest('.context-menu')) hideContextMenu();

      // Tree item click (open note)
      const treeItem = e.target.closest('.tree-item');
      if (treeItem && !e.target.closest('.tree-action-btn') && !e.target.closest('.tree-toggle')) {
        const id = treeItem.dataset.id;
        if (id) await openNote(id);
        return;
      }

      // Toggle expand
      const toggle = e.target.closest('.tree-toggle[data-toggle]');
      if (toggle) {
        toggleExpand(toggle.dataset.toggle);
        return;
      }

      // Add child
      const addChild = e.target.closest('[data-addchild]');
      if (addChild) {
        await createNote(addChild.dataset.addchild);
        return;
      }

      // Context menu trigger
      const ctxTrigger = e.target.closest('[data-ctxmenu]');
      if (ctxTrigger) {
        const rect = ctxTrigger.getBoundingClientRect();
        showContextMenu(ctxTrigger.dataset.ctxmenu, rect.right, rect.bottom);
        return;
      }

      // Context menu action
      const ctxAction = e.target.closest('.context-menu-item');
      if (ctxAction) {
        const action = ctxAction.dataset.action;
        const id = ctxAction.dataset.id;
        hideContextMenu();
        if (action === 'addchild') await createNote(id);
        else if (action === 'pin') await togglePin(id);
        else if (action === 'archive') await toggleArchive(id);
        else if (action === 'delete') {
          const note = allNotes.find(n => n.id === id);
          const childCount = allNotes.filter(n => n.parentId === id).length;
          showConfirm(
            'Seite löschen?',
            `"${note?.title || 'Ohne Titel'}" wird unwiderruflich gelöscht.` +
            (childCount > 0 ? ` ${childCount} Unterseite(n) werden ebenfalls gelöscht.` : ''),
            'Löschen',
            () => deleteNote(id)
          );
        }
        return;
      }

      // Breadcrumb nav
      const bcNav = e.target.closest('[data-nav]');
      if (bcNav) {
        await openNote(bcNav.dataset.nav);
        return;
      }

      // Search result click
      const searchResult = e.target.closest('.search-result[data-nav]');
      if (searchResult) {
        searchInput.value = '';
        exitSearch();
        await openNote(searchResult.dataset.nav);
        return;
      }

      // Archive restore/delete
      const restoreBtn = e.target.closest('[data-restore]');
      if (restoreBtn) {
        await restoreNote(restoreBtn.dataset.restore);
        return;
      }
      const permDelete = e.target.closest('[data-permdelete]');
      if (permDelete) {
        const id = permDelete.dataset.permdelete;
        showConfirm('Endgültig löschen?', 'Diese Seite wird unwiderruflich gelöscht.', 'Löschen', () => deleteNote(id));
        return;
      }

      // Emoji pick
      const emojiPick = e.target.closest('.emoji-pick');
      if (emojiPick) {
        if (currentNote) {
          currentNote.icon = emojiPick.textContent;
          noteIconBtn.textContent = emojiPick.textContent;
          const idx = allNotes.findIndex(n => n.id === currentNote.id);
          if (idx >= 0) allNotes[idx].icon = currentNote.icon;
          renderSidebar();
          scheduleAutoSave();
        }
        hideEmojiPicker();
        return;
      }
    });

    // New page buttons
    $('newPageBtn').addEventListener('click', () => createNote(null));
    $('emptyNewBtn').addEventListener('click', () => createNote(null));

    // Icon picker
    noteIconBtn.addEventListener('click', () => showEmojiPicker(noteIconBtn));

    // Pin
    pinBtn.addEventListener('click', () => {
      if (currentNote) togglePin(currentNote.id);
    });

    // More button
    $('moreBtn').addEventListener('click', (e) => {
      if (currentNote) {
        const rect = e.target.getBoundingClientRect();
        showContextMenu(currentNote.id, rect.right, rect.bottom);
      }
    });

    // Title input
    noteTitleInput.addEventListener('input', () => scheduleAutoSave());
    noteTitleInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        editorContent.focus();
      }
    });

    // Editor input
    editorContent.addEventListener('input', () => scheduleAutoSave());

    // Search
    searchInput.addEventListener('input', () => doSearch(searchInput.value));
    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        searchInput.value = '';
        exitSearch();
        searchInput.blur();
      }
    });

    // Toolbar
    $('editorToolbar').addEventListener('click', (e) => {
      const btn = e.target.closest('.toolbar-btn');
      if (!btn) return;
      const cmd = btn.dataset.cmd;
      if (cmd) {
        execCmd(cmd, btn.dataset.val || null);
      }
    });
    $('codeBtn').addEventListener('click', () => insertCode());
    $('codeBlockBtn').addEventListener('click', () => insertCodeBlock());
    $('linkBtn').addEventListener('click', () => openLinkModal());

    // Link modal
    $('linkCancel').addEventListener('click', () => $('linkModal').classList.remove('open'));
    $('linkInsert').addEventListener('click', () => insertLink());
    $('linkUrl').addEventListener('keydown', (e) => { if (e.key === 'Enter') insertLink(); });

    // Confirm modal
    $('confirmCancel').addEventListener('click', () => {
      $('confirmModal').classList.remove('open');
      confirmCallback = null;
    });
    $('confirmOk').addEventListener('click', () => {
      $('confirmModal').classList.remove('open');
      if (confirmCallback) confirmCallback();
      confirmCallback = null;
    });

    // Archive toggle
    $('archiveToggle').addEventListener('click', () => {
      archiveOpen = !archiveOpen;
      $('archiveToggle').querySelector('.arrow').classList.toggle('expanded', archiveOpen);
      $('archiveList').classList.toggle('show', archiveOpen);
    });

    // Logout
    $('logoutBtn').addEventListener('click', async () => {
      await fetch(API + '/auth/logout', { method: 'POST', credentials: 'include' }).catch(() => {});
      window.location.href = '/portal';
    });

    // Mobile sidebar
    $('mobileToggle').addEventListener('click', () => {
      $('sidebar').classList.toggle('open');
      $('sidebarOverlay').classList.toggle('show');
    });
    $('sidebarOverlay').addEventListener('click', () => {
      $('sidebar').classList.remove('open');
      $('sidebarOverlay').classList.remove('show');
    });

    // ============================================================
    // Keyboard Shortcuts
    // ============================================================
    document.addEventListener('keydown', (e) => {
      const mod = e.metaKey || e.ctrlKey;

      // Ctrl+S — Force save
      if (mod && e.key === 's') {
        e.preventDefault();
        saveNote();
      }

      // Ctrl+N — New page
      if (mod && !e.shiftKey && e.key === 'n') {
        e.preventDefault();
        createNote(null);
      }

      // Ctrl+Shift+N — New subpage
      if (mod && e.shiftKey && e.key === 'N') {
        e.preventDefault();
        if (currentNote) createNote(currentNote.id);
        else createNote(null);
      }

      // Ctrl+K — Insert link (when in editor)
      if (mod && e.key === 'k' && document.activeElement === editorContent) {
        e.preventDefault();
        openLinkModal();
      }

      // Ctrl+F — Focus search
      if (mod && e.key === 'f' && document.activeElement !== editorContent) {
        e.preventDefault();
        searchInput.focus();
        searchInput.select();
      }
    });

    // ============================================================
    // Drag & Drop
    // ============================================================
    document.addEventListener('dragstart', (e) => {
      const item = e.target.closest('.tree-item');
      if (!item) return;
      draggedId = item.dataset.id;
      item.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });

    document.addEventListener('dragend', (e) => {
      document.querySelectorAll('.dragging, .drag-over').forEach(el => {
        el.classList.remove('dragging', 'drag-over');
      });
      draggedId = null;
    });

    document.addEventListener('dragover', (e) => {
      e.preventDefault();
      const item = e.target.closest('.tree-item');
      if (!item || item.dataset.id === draggedId) return;
      e.dataTransfer.dropEffect = 'move';
      document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
      item.classList.add('drag-over');
    });

    document.addEventListener('drop', async (e) => {
      e.preventDefault();
      document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
      const item = e.target.closest('.tree-item');
      if (!item || !draggedId || item.dataset.id === draggedId) return;

      const targetId = item.dataset.id;
      await moveNote(draggedId, targetId, 0);
      draggedId = null;
    });

    // ============================================================
    // Paste: Clean HTML on paste
    // ============================================================
    editorContent.addEventListener('paste', (e) => {
      const html = e.clipboardData.getData('text/html');
      const text = e.clipboardData.getData('text/plain');

      // If pasting from external source, clean up
      if (html && html.includes('<')) {
        // Allow paste as-is but schedule save
        scheduleAutoSave();
        return;
      }

      // Plain text paste
      if (text) {
        e.preventDefault();
        document.execCommand('insertText', false, text);
        scheduleAutoSave();
      }
    });

    // ============================================================
    // Start App
    // ============================================================
    initApp();
  </script>
</body>

</html>

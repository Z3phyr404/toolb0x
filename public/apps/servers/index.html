<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Toolb0x — Server-Verwaltung</title>
  <link rel="stylesheet" href="/shared/obsidian.css" nonce="__CSP_NONCE__">
  <style nonce="__CSP_NONCE__">
    /* ============================================================
       OBSIDIAN — SERVER-VERWALTUNG
       ============================================================ */

    html, body { height:100%; overflow:hidden; }

    .ob-page {
      position: relative;
      min-height: 100vh;
      overflow-x: hidden;
      overflow-y: auto;
      padding-bottom: 72px;
    }

    /* ===== GLOW BLOBS ===== */
    .glow-blob {
      position: absolute;
      pointer-events: none;
      transition: transform 0.35s cubic-bezier(0.2,0.8,0.2,1), background 0.5s ease;
    }
    .glow-primary {
      top: -160px; right: -120px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(56,189,248,0.22), transparent 70%);
    }
    .glow-secondary {
      bottom: -200px; left: -140px;
      width: 520px; height: 520px;
      background: radial-gradient(circle, rgba(45,212,191,0.07), transparent 72%);
      transition-duration: 0.55s;
    }

    /* ===== HEADER ===== */
    .ob-header {
      position: relative; z-index: 1;
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 34px;
      border-bottom: 1px solid var(--border);
      background: rgba(18,22,29,0.6);
    }
    .ob-header-left {
      display: flex; align-items: center; gap: 20px;
    }
    .back-link {
      display: inline-flex; align-items: center; gap: 7px;
      font-size: 13px; color: var(--text-2);
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--text); }
    .header-brand {
      display: flex; align-items: center; gap: 11px;
    }
    .brand-icon {
      width: 32px; height: 32px; border-radius: 9px;
      background: linear-gradient(135deg,#7dd3fc,#0ea5e9);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 5px 16px rgba(14,165,233,0.35);
    }
    .brand-icon svg { color: #052131; }
    .brand-title {
      font-size: 17px; font-weight: 700; letter-spacing: -0.02em;
    }
    .ob-header-right {
      display: flex; align-items: center; gap: 14px;
    }
    .user-name { font-size: 14px; font-weight: 500; }

    /* ===== MAIN ===== */
    .ob-main {
      position: relative; z-index: 1;
      max-width: 1000px; margin: 0 auto;
      padding: 34px;
    }

    /* ===== TOOLBAR ===== */
    .ob-toolbar {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 14px; margin-bottom: 26px;
    }
    .section-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px; letter-spacing: 0.14em;
      color: rgba(56,189,248,0.9);
      margin-bottom: 8px;
    }
    .ob-toolbar h1 {
      font-size: 32px; font-weight: 700; letter-spacing: -0.03em;
    }
    .add-btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 11px 18px; border: none; border-radius: var(--radius-btn);
      background: linear-gradient(135deg,#7dd3fc,#0ea5e9);
      color: #052131; font-family: inherit;
      font-size: 14px; font-weight: 700; cursor: pointer;
      box-shadow: 0 6px 20px rgba(14,165,233,0.3);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .add-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 26px rgba(14,165,233,0.42);
    }

    /* ===== SERVER CARDS ===== */
    .server-list {
      display: flex; flex-direction: column; gap: 16px;
    }
    .server-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 24px;
      transition: border-color 0.25s, transform 0.25s;
    }
    .server-card:hover {
      border-color: rgba(56,189,248,0.28);
      transform: translateY(-2px);
    }
    .server-card.offline-card {
      opacity: 0.85;
    }
    .server-card.offline-card:hover {
      border-color: rgba(255,107,96,0.28);
    }

    .server-top {
      display: flex; align-items: flex-start; justify-content: space-between;
      margin-bottom: 20px; flex-wrap: wrap; gap: 12px;
    }
    .server-top-left {
      display: flex; align-items: center; gap: 14px;
    }
    .server-icon {
      width: 46px; height: 46px; border-radius: 12px;
      background: rgba(56,189,248,0.13); color: #38bdf8;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .server-icon.offline-icon {
      background: rgba(255,255,255,0.05);
      color: rgba(238,241,246,0.5);
    }
    .server-label { font-size: 17px; font-weight: 700; }
    .server-host {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px; color: var(--text-2); margin-top: 3px;
    }

    .server-top-right {
      display: flex; align-items: center; gap: 8px;
    }

    /* ===== STATUS PILLS ===== */
    .status-pill {
      display: flex; align-items: center; gap: 7px;
      font-size: 12px; font-weight: 600;
      font-family: 'JetBrains Mono', monospace;
      padding: 6px 12px; border-radius: 99px;
    }
    .status-pill.online {
      background: rgba(52,211,153,0.12); color: #34d399;
    }
    .status-pill.offline {
      background: rgba(255,59,48,0.12); color: #ff6b60;
    }
    .status-pill.loading {
      background: rgba(251,191,36,0.12); color: #fbbf24;
    }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
    }
    .status-pill.online .status-dot {
      background: #34d399; animation: pulse 2s ease infinite;
    }
    .status-pill.offline .status-dot {
      background: #ff6b60;
    }
    .status-pill.loading .status-dot {
      background: #fbbf24; animation: pulse 1.2s ease infinite;
    }

    /* ===== REFRESH BUTTON ===== */
    .refresh-btn {
      width: 34px; height: 34px; border: none; border-radius: 9px;
      background: rgba(255,255,255,0.05); color: rgba(238,241,246,0.6);
      cursor: pointer; transition: background 0.2s;
      display: flex; align-items: center; justify-content: center;
    }
    .refresh-btn:hover { background: rgba(255,255,255,0.12); }

    /* ===== STAT BARS ===== */
    .stats-grid {
      display: grid; grid-template-columns: repeat(3,1fr); gap: 18px;
      margin-bottom: 20px;
    }
    .stat-label-row {
      display: flex; justify-content: space-between;
      font-size: 12px; margin-bottom: 7px;
    }
    .stat-label-row .label {
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-2);
    }
    .stat-label-row .value { font-weight: 700; }
    .stat-bar {
      height: 7px; border-radius: 4px;
      background: rgba(255,255,255,0.06); overflow: hidden;
    }
    .stat-bar-fill {
      height: 100%; border-radius: 4px;
      transition: width 0.4s ease;
    }
    .stat-bar-fill.bar-cpu { background: linear-gradient(90deg,#38bdf8,#0ea5e9); }
    .stat-bar-fill.bar-ram { background: linear-gradient(90deg,#a78bfa,#7c3aed); }
    .stat-bar-fill.bar-disk { background: linear-gradient(90deg,#34d399,#059669); }

    /* Full stats grid (expanded, for detailed view) */
    .stats-grid-full {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
      margin-bottom: 14px; position: relative;
    }
    .stats-grid-full:not(.hidden-init)::after {
      content: 'LIVE \00b7 alle 30s';
      position: absolute; top: -10px; right: 0;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; font-weight: 600;
      color: #38bdf8; letter-spacing: 0.3px; opacity: 0.7;
    }
    .stat-item {
      padding: 10px 12px;
      background: rgba(255,255,255,0.03); border-radius: var(--radius-btn);
    }
    .stat-item-label {
      font-size: 11px; font-weight: 600; color: var(--text-2);
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;
      font-family: 'JetBrains Mono', monospace;
    }
    .stat-item-value { font-size: 15px; font-weight: 700; }
    .stat-item-bar {
      height: 6px; background: rgba(255,255,255,0.06);
      border-radius: 3px; margin-top: 6px; overflow: hidden;
    }
    .stat-item-bar-fill {
      height: 100%; border-radius: 3px; transition: width 0.4s ease;
    }
    .stat-item-bar-fill.low { background: #34d399; }
    .stat-item-bar-fill.mid { background: #fbbf24; }
    .stat-item-bar-fill.high { background: #ff6b60; }
    .stat-item.full-width { grid-column: 1 / -1; }

    /* ===== ACTION BUTTONS ===== */
    .action-row {
      display: flex; gap: 8px; flex-wrap: wrap;
    }
    .action-btn {
      font-family: inherit; font-size: 13px; font-weight: 600;
      padding: 9px 16px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04);
      color: rgba(238,241,246,0.75);
      border-radius: 10px; cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      transition: background 0.2s;
    }
    .action-btn:hover { background: rgba(255,255,255,0.09); }
    .action-btn:disabled { opacity: 0.4; pointer-events: none; }
    .action-btn.primary {
      border-color: rgba(56,189,248,0.25);
      background: rgba(56,189,248,0.1);
      color: #38bdf8;
    }
    .action-btn.primary:hover { background: rgba(56,189,248,0.18); }
    .action-btn.danger {
      border-color: rgba(255,59,48,0.2);
      background: rgba(255,59,48,0.08);
      color: #ff6b60;
    }
    .action-btn.danger:hover { background: rgba(255,59,48,0.15); }

    /* ===== SERVICES PANEL ===== */
    .services-panel {
      margin-top: 12px; padding: 14px;
      background: rgba(255,255,255,0.03); border-radius: 14px;
      display: none;
    }
    .services-panel.open { display: block; }
    .services-panel-title {
      font-size: 13px; font-weight: 700; margin-bottom: 10px;
      color: var(--text-2);
    }
    .service-item {
      display: flex; align-items: center; gap: 10px;
      padding: 6px 0; border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .service-item:last-child { border-bottom: none; }
    .service-name {
      flex: 1; font-weight: 500;
      font-family: 'JetBrains Mono', monospace;
    }
    .service-restart-btn {
      padding: 4px 10px; border: none; border-radius: 8px;
      background: rgba(56,189,248,0.1); color: #38bdf8;
      font-size: 11px; font-weight: 600; cursor: pointer;
      font-family: inherit;
    }
    .service-restart-btn:hover { background: rgba(56,189,248,0.18); }
    .service-restart-btn:disabled { opacity: 0.3; pointer-events: none; }
    .services-error { color: var(--error-text); }

    /* ===== UPDATE LOG ===== */
    .update-log {
      margin-top: 12px; display: none;
    }
    .update-log.open { display: block; }
    .update-log-title {
      font-size: 13px; font-weight: 700; margin-bottom: 8px;
      color: var(--text-2);
    }
    .update-log-output {
      width: 100%; height: 200px; padding: 12px;
      background: rgba(0,0,0,0.4); color: #34d399;
      border: 1px solid var(--border); border-radius: var(--radius-btn);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; line-height: 1.5; resize: vertical;
      overflow-y: auto;
    }

    /* ===== EMPTY STATE ===== */
    .empty-state {
      text-align: center; padding: 60px 20px;
      color: var(--text-2);
    }
    .empty-state-icon {
      width: 64px; height: 64px; margin: 0 auto 20px;
      border-radius: 16px; background: rgba(56,189,248,0.13);
      color: #38bdf8; display: flex; align-items: center; justify-content: center;
    }
    .empty-state-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; color: var(--text); }
    .empty-state-desc { font-size: 14px; }

    /* ===== MODAL ===== */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s;
      padding: 20px;
    }
    .modal-overlay.open {
      opacity: 1; pointer-events: all;
    }
    .modal {
      width: 100%; max-width: 480px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      padding: 28px;
      max-height: 90vh; overflow-y: auto;
    }
    .modal-title { font-size: 20px; font-weight: 700; margin-bottom: 20px; }

    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block; font-size: 13px; font-weight: 600;
      margin-bottom: 6px; color: var(--text-2);
    }
    .form-input, .form-select, .form-textarea {
      width: 100%; padding: 12px 14px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius-btn);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      font-size: 14px; font-family: inherit; outline: none;
      transition: border-color 0.2s;
    }
    .form-input::placeholder, .form-textarea::placeholder {
      color: var(--text-3);
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus {
      border-color: #38bdf8;
    }
    .form-textarea {
      min-height: 80px; resize: vertical;
      font-family: 'JetBrains Mono', monospace; font-size: 12px;
    }

    .auth-toggle {
      display: flex; gap: 0; margin-bottom: 16px;
      border-radius: var(--radius-btn); overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .auth-toggle-btn {
      flex: 1; padding: 8px; border: none;
      background: rgba(255,255,255,0.04); color: var(--text-2);
      font-size: 13px; font-weight: 600; cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, color 0.15s;
    }
    .auth-toggle-btn.active {
      background: linear-gradient(135deg,#38bdf8,#0ea5e9);
      color: #052131;
    }

    .modal-actions {
      display: flex; gap: 10px; margin-top: 24px;
    }
    .modal-btn {
      flex: 1; padding: 12px; border: none; border-radius: var(--radius-btn);
      font-size: 15px; font-weight: 700; cursor: pointer;
      font-family: inherit; transition: opacity 0.2s;
    }
    .modal-btn.primary {
      background: linear-gradient(135deg,#7dd3fc,#0ea5e9);
      color: #052131;
    }
    .modal-btn.primary:hover { opacity: 0.88; }
    .modal-btn.secondary {
      background: rgba(255,255,255,0.06); color: var(--text-2);
    }
    .modal-btn.secondary:hover { background: rgba(255,255,255,0.1); }
    .modal-btn.btn-danger {
      background: #ff3b30; color: #fff;
    }
    .modal-btn.btn-danger:hover { opacity: 0.88; }

    .form-error {
      color: var(--error-text); font-size: 13px; margin-top: 4px;
      display: none;
    }
    .form-error.show { display: block; }

    /* ===== CONFIRM MODAL ===== */
    .confirm-text {
      font-size: 15px; line-height: 1.6; color: var(--text-2);
      margin-bottom: 8px;
    }
    .confirm-warning {
      padding: 12px; border-radius: var(--radius-btn);
      background: rgba(255,59,48,0.1);
      border: 1px solid rgba(255,59,48,0.2);
      color: var(--error-text);
      font-size: 13px; font-weight: 500; margin-bottom: 16px;
    }

    /* ===== SERVER INFO ===== */
    .server-info {
      font-size: 13px; color: var(--text-2); margin-bottom: 14px;
      min-height: 18px;
    }

    /* ===== UTILITY ===== */
    .hidden-init { display: none; }
    .notes-textarea {
      font-family: inherit !important;
      font-size: 14px !important;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 600px) {
      .ob-header { padding: 14px 16px; gap: 12px; }
      .ob-main { padding: 20px 16px; }
      .ob-toolbar h1 { font-size: 24px; }
      .stats-grid { grid-template-columns: 1fr; gap: 10px; }
      .stats-grid-full { grid-template-columns: 1fr; }
      .action-row { gap: 6px; }
      .action-btn { padding: 7px 12px; font-size: 12px; }
      .server-card { padding: 18px; }
      .modal { padding: 20px; }
      .ob-header-right .user-name { display: none; }
    }
  </style>
</head>

<body>
<div class="ob-loading" id="loadingOverlay"><div class="ob-spinner"></div></div>

<div class="ob-page" id="pageRoot">
  <!-- Glow Blobs -->
  <div class="glow-blob glow-primary" data-glow data-glow-primary data-depth="55"></div>
  <div class="glow-blob glow-secondary" data-glow data-depth="30"></div>

  <header class="ob-header">
    <div class="ob-header-left">
      <a href="/portal" class="back-link">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Zur Übersicht
      </a>
      <div class="header-brand">
        <div class="brand-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="4" width="17" height="6.5" rx="1.8"/><rect x="3.5" y="13.5" width="17" height="6.5" rx="1.8"/><path d="M7 7.25h.01M7 16.75h.01"/></svg>
        </div>
        <span class="brand-title jitter">Server-Verwaltung</span>
      </div>
    </div>
    <div class="ob-header-right">
      <span class="user-name" id="userName"></span>
      <button class="ob-btn-logout" id="logoutBtn">Abmelden</button>
    </div>
  </header>

  <main class="ob-main">
    <div class="ob-toolbar" data-reveal data-reveal-index="0">
      <div>
        <div class="section-label">// INFRASTRUKTUR</div>
        <h1 class="jitter">Meine Server</h1>
      </div>
      <button class="add-btn" id="addServerBtn">&#xFF0B; Server hinzufügen</button>
    </div>

    <div class="server-list" id="serverList"></div>
  </main>
</div>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="serverModal">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Server hinzufügen</div>

    <div class="form-group">
      <label class="form-label">Name</label>
      <input class="form-input" id="fLabel" placeholder="z.B. Hetzner VPS">
    </div>
    <div class="form-group">
      <label class="form-label">Host / IP</label>
      <input class="form-input" id="fHost" placeholder="z.B. 116.203.xx.xx oder toolb0x.eu">
    </div>
    <div class="form-group">
      <label class="form-label">Port</label>
      <input class="form-input" id="fPort" type="number" value="22" min="1" max="65535">
    </div>
    <div class="form-group">
      <label class="form-label">Benutzername</label>
      <input class="form-input" id="fUsername" placeholder="root">
    </div>

    <label class="form-label">Authentifizierung</label>
    <div class="auth-toggle">
      <button class="auth-toggle-btn active" id="authPwBtn" type="button">Passwort</button>
      <button class="auth-toggle-btn" id="authKeyBtn" type="button">SSH Key</button>
    </div>

    <div id="pwFields">
      <div class="form-group">
        <label class="form-label">SSH-Passwort</label>
        <input class="form-input" id="fPassword" type="password">
      </div>
    </div>
    <div id="keyFields" class="hidden-init">
      <div class="form-group">
        <label class="form-label">Private Key</label>
        <textarea class="form-textarea" id="fPrivateKey" rows="4" placeholder="-----BEGIN OPENSSH PRIVATE KEY-----"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Passphrase (optional)</label>
        <input class="form-input" id="fPassphrase" type="password">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Notizen (optional)</label>
      <textarea class="form-textarea notes-textarea" id="fNotes" rows="2" placeholder="z.B. Ubuntu 24.04, 4GB RAM"></textarea>
    </div>

    <div class="form-error" id="formError"></div>

    <div class="modal-actions">
      <button class="modal-btn secondary" id="modalCancel">Abbrechen</button>
      <button class="modal-btn primary" id="modalSave">Speichern</button>
    </div>
  </div>
</div>

<!-- CONFIRM MODAL -->
<div class="modal-overlay" id="confirmModal">
  <div class="modal">
    <div class="modal-title" id="confirmTitle">Bestätigung</div>
    <div class="confirm-text" id="confirmText"></div>
    <div class="confirm-warning" id="confirmWarning"></div>
    <div class="modal-actions">
      <button class="modal-btn secondary" id="confirmCancel">Abbrechen</button>
      <button class="modal-btn btn-danger" id="confirmOk">Bestätigen</button>
    </div>
  </div>
</div>

<div class="ob-toast-box" id="toasts"></div>

<script nonce="__CSP_NONCE__" src="/shared/session-timeout.js"></script>
<script nonce="__CSP_NONCE__" src="/shared/obsidian.js"></script>
<script nonce="__CSP_NONCE__">
(function() {
  'use strict';

  var API = '/api';
  var allServers = [];
  var editingId = null;
  var confirmCallback = null;
  var statsTimers = {};
  var currentAuthType = 'password';

  // SVG stroke icons (no emojis)

  function $(id) { return document.getElementById(id); }

  function escapeHtml(str) {
    var d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  function getCsrfToken() {
    var m = document.cookie.match(/(?:^|;\s*)csrf_token=([^;]*)/);
    return m ? m[1] : '';
  }

  function toast(msg, type) {
    var el = document.createElement('div');
    el.className = 'ob-toast ' + (type || 'success');
    el.textContent = msg;
    $('toasts').appendChild(el);
    setTimeout(function() { el.remove(); }, 3100);
  }

  function showLoading() { $('loadingOverlay').classList.remove('hidden'); }
  function hideLoading() { $('loadingOverlay').classList.add('hidden'); }

  function api(endpoint, options) {
    var opts = options || {};
    var headers = opts.headers || {};
    headers['Content-Type'] = 'application/json';
    if (opts.method && opts.method !== 'GET') {
      headers['X-CSRF-Token'] = getCsrfToken();
    }
    return fetch(API + endpoint, {
      method: opts.method || 'GET',
      credentials: 'include',
      headers: headers,
      body: opts.body ? JSON.stringify(opts.body) : undefined,
    }).then(function(res) {
      return res.json().then(function(data) {
        if (!res.ok) throw data;
        return data;
      });
    });
  }

  // ============================================================
  // AUTH
  // ============================================================

  function logout() {
    SessionTimeout.stop();
    fetch(API + '/auth/logout', {
      method: 'POST', credentials: 'include',
      headers: { 'X-CSRF-Token': getCsrfToken() }
    }).catch(function() {});
    window.location.href = '/portal';
  }

  function checkAuth() {
    showLoading();
    if (SessionTimeout.wasRestarted()) {
      fetch(API + '/auth/logout', {
        method: 'POST', credentials: 'include',
        headers: { 'X-CSRF-Token': getCsrfToken() }
      }).catch(function() {});
      window.location.href = '/portal';
      return;
    }

    api('/auth/me').then(function(data) {
      if (data.user.role !== 'admin') {
        window.location.href = '/portal';
        return;
      }
      $('userName').textContent = data.user.name;
      hideLoading();

      SessionTimeout.start(function() {
        window.location.href = '/portal';
      });

      loadServers();
    }).catch(function() {
      window.location.href = '/portal';
    });
  }

  // ============================================================
  // CRUD
  // ============================================================

  function loadServers() {
    api('/servers').then(function(data) {
      allServers = data.servers || [];
      Object.keys(statsTimers).forEach(stopStatsAutoRefresh);
      renderServerList();
      allServers.forEach(function(s) { SRV.fetchStatus(s.id); });
    }).catch(function(err) {
      toast(err.error || 'Server konnten nicht geladen werden.', 'error');
    });
  }

  function saveServer() {
    var body = {
      label: $('fLabel').value.trim(),
      host: $('fHost').value.trim(),
      port: $('fPort').value || '22',
      username: $('fUsername').value.trim(),
      authType: currentAuthType,
      password: currentAuthType === 'password' ? $('fPassword').value : '',
      privateKey: currentAuthType === 'key' ? $('fPrivateKey').value : '',
      passphrase: currentAuthType === 'key' ? $('fPassphrase').value : '',
      notes: $('fNotes').value.trim(),
    };

    var endpoint = editingId ? '/servers/' + editingId : '/servers';
    var method = editingId ? 'PUT' : 'POST';

    $('modalSave').disabled = true;
    api(endpoint, { method: method, body: body }).then(function() {
      closeModal();
      toast(editingId ? 'Server aktualisiert.' : 'Server hinzugefügt.');
      loadServers();
    }).catch(function(err) {
      var msg = err.errors ? err.errors.join(' ') : (err.error || 'Fehler beim Speichern.');
      $('formError').textContent = msg;
      $('formError').classList.add('show');
    }).finally(function() {
      $('modalSave').disabled = false;
    });
  }

  function deleteServer(id) {
    showConfirm(
      'Server löschen',
      'Möchtest du diesen Server wirklich löschen?',
      'Alle gespeicherten Zugangsdaten werden unwiderruflich entfernt.',
      function() {
        api('/servers/' + id, { method: 'DELETE' }).then(function() {
          stopStatsAutoRefresh(id);
          toast('Server gelöscht.');
          loadServers();
        }).catch(function(err) {
          toast(err.error || 'Fehler beim Löschen.', 'error');
        });
      }
    );
  }

  // ============================================================
  // RENDERING
  // ============================================================

  function formatUptime(seconds) {
    var d = Math.floor(seconds / 86400);
    var h = Math.floor((seconds % 86400) / 3600);
    var m = Math.floor((seconds % 3600) / 60);
    if (d > 0) return d + 'd ' + h + 'h';
    if (h > 0) return h + 'h ' + m + 'm';
    return m + 'm';
  }

  function formatBytes(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
    if (bytes < 1073741824) return (bytes / 1048576).toFixed(1) + ' MB';
    return (bytes / 1073741824).toFixed(2) + ' GB';
  }

  function barClass(pct) {
    if (pct < 60) return 'low';
    if (pct < 85) return 'mid';
    return 'high';
  }

  function renderServerList() {
    var list = $('serverList');

    if (allServers.length === 0) {
      list.innerHTML = '<div class="empty-state">'
        + '<div class="empty-state-icon">' + ICON.emptyServer + '</div>'
        + '<div class="empty-state-title">Noch keine Server</div>'
        + '<div class="empty-state-desc">Füge deinen ersten Server hinzu, um loszulegen.</div>'
        + '</div>';
      return;
    }

    list.innerHTML = allServers.map(function(s, idx) {
      return '<div class="server-card" data-id="' + s.id + '" data-reveal data-reveal-index="' + (idx + 1) + '" data-glow-color="rgba(52,211,153,0.24)">'
        + '<div class="server-top">'
        + '<div class="server-top-left">'
        + '<div class="server-icon" id="icon-' + s.id + '">' + ICON.server + '</div>'
        + '<div>'
        + '<div class="server-label">' + escapeHtml(s.label) + '</div>'
        + '<div class="server-host">' + escapeHtml(s.username || 'root') + '@' + escapeHtml(s.host) + ':' + escapeHtml(String(s.port || 22)) + '</div>'
        + '</div>'
        + '</div>'
        + '<div class="server-top-right">'
        + '<span class="status-pill loading" id="pill-' + s.id + '"><span class="status-dot"></span>PRÜFE</span>'
        + '<button class="refresh-btn" data-action="status" data-id="' + s.id + '">' + ICON.refresh + '</button>'
        + '</div>'
        + '</div>'
        + '<div class="server-info" id="info-' + s.id + '">' + (s.notes ? escapeHtml(s.notes) : 'Verbindung wird geprüft...') + '</div>'
        + '<div class="stats-grid hidden-init" id="mini-stats-' + s.id + '"></div>'
        + '<div class="stats-grid-full hidden-init" id="stats-' + s.id + '"></div>'
        + '<div class="action-row">'
        + '<button class="action-btn primary" data-action="stats" data-id="' + s.id + '">' + ICON.barChart + ' Stats</button>'
        + '<button class="action-btn" data-action="services" data-id="' + s.id + '">' + ICON.layers + ' Services</button>'
        + '<button class="action-btn" id="updateBtn-' + s.id + '" data-action="update" data-id="' + s.id + '">' + ICON.upload + ' Updates</button>'
        + '<button class="action-btn" data-action="restart" data-id="' + s.id + '">' + ICON.rotateCw + ' Neustart</button>'
        + '<button class="action-btn" data-action="edit" data-id="' + s.id + '">' + ICON.edit + ' Bearbeiten</button>'
        + '<button class="action-btn danger" data-action="delete" data-id="' + s.id + '">' + ICON.trash + ' Löschen</button>'
        + '</div>'
        + '<div class="services-panel" id="services-' + s.id + '"></div>'
        + '<div class="update-log" id="updateLog-' + s.id + '">'
        + '<div class="update-log-title">Update-Log</div>'
        + '<textarea class="update-log-output" id="updateOutput-' + s.id + '" readonly></textarea>'
        + '</div>'
        + '</div>';
    }).join('');

    // Re-init reveal for dynamically added cards
    initReveal($('pageRoot'));
  }

  function renderMiniStats(id, data) {
    var grid = $('mini-stats-' + id);
    if (!grid) return;

    var cpuPct = Math.round(data.cpu);
    var ramPct = data.ram.total > 0 ? Math.round((data.ram.used / data.ram.total) * 100) : 0;
    var diskPct = parseInt(data.disk.percent) || 0;

    grid.classList.remove('hidden-init');
    grid.innerHTML = ''
      + '<div>'
      + '<div class="stat-label-row"><span class="label">CPU</span><span class="value">' + cpuPct + '%</span></div>'
      + '<div class="stat-bar"><div class="stat-bar-fill bar-cpu" data-pct="' + cpuPct + '"></div></div>'
      + '</div>'
      + '<div>'
      + '<div class="stat-label-row"><span class="label">RAM</span><span class="value">' + ramPct + '%</span></div>'
      + '<div class="stat-bar"><div class="stat-bar-fill bar-ram" data-pct="' + ramPct + '"></div></div>'
      + '</div>'
      + '<div>'
      + '<div class="stat-label-row"><span class="label">Disk</span><span class="value">' + diskPct + '%</span></div>'
      + '<div class="stat-bar"><div class="stat-bar-fill bar-disk" data-pct="' + diskPct + '"></div></div>'
      + '</div>';

    var bars = grid.querySelectorAll('.stat-bar-fill[data-pct]');
    for (var i = 0; i < bars.length; i++) {
      bars[i].style.width = bars[i].dataset.pct + '%';
    }
  }

  function renderStats(id, data) {
    var grid = $('stats-' + id);
    if (!grid) return;

    var cpuPct = Math.round(data.cpu);
    var ramPct = data.ram.total > 0 ? Math.round((data.ram.used / data.ram.total) * 100) : 0;
    var diskPct = parseInt(data.disk.percent) || 0;

    grid.classList.remove('hidden-init');
    grid.innerHTML = ''
      + '<div class="stat-item">'
      + '<div class="stat-item-label">CPU</div>'
      + '<div class="stat-item-value">' + cpuPct + '%</div>'
      + '<div class="stat-item-bar"><div class="stat-item-bar-fill ' + barClass(cpuPct) + '" data-pct="' + cpuPct + '"></div></div>'
      + '</div>'
      + '<div class="stat-item">'
      + '<div class="stat-item-label">RAM</div>'
      + '<div class="stat-item-value">' + (data.ram.used / 1024).toFixed(1) + ' / ' + (data.ram.total / 1024).toFixed(1) + ' GB</div>'
      + '<div class="stat-item-bar"><div class="stat-item-bar-fill ' + barClass(ramPct) + '" data-pct="' + ramPct + '"></div></div>'
      + '</div>'
      + '<div class="stat-item">'
      + '<div class="stat-item-label">Disk</div>'
      + '<div class="stat-item-value">' + escapeHtml(data.disk.used) + ' / ' + escapeHtml(data.disk.total) + '</div>'
      + '<div class="stat-item-bar"><div class="stat-item-bar-fill ' + barClass(diskPct) + '" data-pct="' + diskPct + '"></div></div>'
      + '</div>'
      + '<div class="stat-item">'
      + '<div class="stat-item-label">Load</div>'
      + '<div class="stat-item-value">' + escapeHtml(data.load.l1) + ' / ' + escapeHtml(data.load.l5) + ' / ' + escapeHtml(data.load.l15) + '</div>'
      + '</div>'
      + '<div class="stat-item">'
      + '<div class="stat-item-label">Netzwerk ↓</div>'
      + '<div class="stat-item-value">' + formatBytes(data.network.rx) + '</div>'
      + '</div>'
      + '<div class="stat-item">'
      + '<div class="stat-item-label">Netzwerk ↑</div>'
      + '<div class="stat-item-value">' + formatBytes(data.network.tx) + '</div>'
      + '</div>'
      + '<div class="stat-item full-width">'
      + '<div class="stat-item-label">Uptime</div>'
      + '<div class="stat-item-value">' + formatUptime(data.uptime) + '</div>'
      + '</div>';

    var bars = grid.querySelectorAll('.stat-item-bar-fill[data-pct]');
    for (var i = 0; i < bars.length; i++) {
      bars[i].style.width = bars[i].dataset.pct + '%';
    }

    // Also render mini stats
    renderMiniStats(id, data);
  }

  // ============================================================
  // SSH ACTIONS
  // ============================================================

  function setPill(id, cls, label) {
    var pill = $('pill-' + id);
    if (pill) {
      pill.className = 'status-pill ' + cls;
      pill.innerHTML = '<span class="status-dot"></span>' + label;
    }
    // Toggle offline styling on card
    var card = pill ? pill.closest('.server-card') : null;
    if (card) {
      card.classList.toggle('offline-card', cls === 'offline');
      var icon = $('icon-' + id);
      if (icon) icon.classList.toggle('offline-icon', cls === 'offline');
    }
  }

  function setInfo(id, text) {
    var el = $('info-' + id);
    if (el) { el.textContent = text; }
  }

  window.SRV = {};

  SRV.fetchStatus = function(id) {
    setPill(id, 'loading', 'PRÜFE');
    setInfo(id, 'Prüfe Verbindung...');
    api('/servers/' + id + '/status', { method: 'POST' }).then(function(data) {
      if (data.online) {
        setPill(id, 'online', 'ONLINE');
        setInfo(id, (data.os || '') + ' \u00b7 ' + (data.uptime || ''));
      } else {
        setPill(id, 'offline', 'OFFLINE');
        setInfo(id, data.error || 'Server nicht erreichbar.');
        // Hide mini stats for offline servers
        var mini = $('mini-stats-' + id);
        if (mini) mini.classList.add('hidden-init');
      }
    }).catch(function(err) {
      setPill(id, 'offline', 'OFFLINE');
      setInfo(id, err.error || 'Fehler bei der Statusprüfung.');
    });
  };

  SRV.fetchStats = function(id) {
    setPill(id, 'loading', 'LADE');
    api('/servers/' + id + '/stats', { method: 'POST' }).then(function(data) {
      setPill(id, 'online', 'ONLINE');
      renderStats(id, data);
      startStatsAutoRefresh(id);
    }).catch(function(err) {
      setPill(id, 'offline', 'OFFLINE');
      toast(err.error || 'Stats konnten nicht geladen werden.', 'error');
      stopStatsAutoRefresh(id);
    });
  };

  function fetchStatsQuiet(id) {
    api('/servers/' + id + '/stats', { method: 'POST' }).then(function(data) {
      setPill(id, 'online', 'ONLINE');
      renderStats(id, data);
    }).catch(function() {
      setPill(id, 'offline', 'OFFLINE');
    });
  }

  function startStatsAutoRefresh(id) {
    stopStatsAutoRefresh(id);
    statsTimers[id] = setInterval(function() {
      if (document.visibilityState !== 'visible') return;
      var grid = $('stats-' + id);
      if (!grid || grid.classList.contains('hidden-init')) {
        stopStatsAutoRefresh(id);
        return;
      }
      fetchStatsQuiet(id);
    }, 30000);
  }

  function stopStatsAutoRefresh(id) {
    if (statsTimers[id]) {
      clearInterval(statsTimers[id]);
      delete statsTimers[id];
    }
  }

  SRV.toggleServices = function(id) {
    var panel = $('services-' + id);
    if (!panel) return;

    if (panel.classList.contains('open')) {
      panel.classList.remove('open');
      return;
    }

    panel.innerHTML = '<div class="services-panel-title">Lade Services...</div>';
    panel.classList.add('open');

    api('/servers/' + id + '/services', { method: 'POST' }).then(function(data) {
      var services = data.services || [];
      if (services.length === 0) {
        panel.innerHTML = '<div class="services-panel-title">Keine laufenden Services gefunden.</div>';
        return;
      }
      panel.innerHTML = '<div class="services-panel-title">Laufende Services (' + services.length + ')</div>'
        + services.map(function(s) {
          return '<div class="service-item">'
            + '<span class="service-name">' + escapeHtml(s) + '</span>'
            + '<button class="service-restart-btn" data-action="service-restart" data-server="' + id + '" data-service="' + escapeHtml(s) + '">' + ICON.rotateCw + ' Neustarten</button>'
            + '</div>';
        }).join('');
    }).catch(function(err) {
      panel.innerHTML = '<div class="services-panel-title services-error">' + escapeHtml(err.error || 'Fehler beim Laden.') + '</div>';
    });
  };

  SRV.restartService = function(serverId, serviceName, btn) {
    if (btn) btn.disabled = true;
    api('/servers/' + serverId + '/service-restart', {
      method: 'POST',
      body: { service: serviceName }
    }).then(function(data) {
      toast(data.message || serviceName + ' neu gestartet.');
      if (btn) { btn.disabled = false; }
    }).catch(function(err) {
      toast(err.error || 'Fehler beim Neustarten.', 'error');
      if (btn) { btn.disabled = false; }
    });
  };

  SRV.runUpdate = function(id) {
    showConfirm(
      'System-Update',
      'Möchtest du ein System-Update auf diesem Server durchführen?',
      'Es wird apt-get update && apt-get upgrade -y ausgeführt. Das kann einige Minuten dauern.',
      function() {
        var btn = $('updateBtn-' + id);
        if (btn) { btn.disabled = true; btn.innerHTML = ICON.upload + ' Läuft...'; }
        var log = $('updateLog-' + id);
        var output = $('updateOutput-' + id);
        if (log) log.classList.add('open');
        if (output) output.value = 'Update wird ausgeführt...\n';

        api('/servers/' + id + '/update', { method: 'POST' }).then(function(data) {
          if (output) output.value = data.output || '';
          if (data.stderr) { output.value += '\n--- STDERR ---\n' + data.stderr; }
          toast(data.success ? 'Update erfolgreich.' : 'Update abgeschlossen (mit Warnungen).', data.success ? 'success' : 'error');
        }).catch(function(err) {
          if (output) output.value += '\nFehler: ' + (err.error || 'Unbekannter Fehler');
          toast(err.error || 'Update fehlgeschlagen.', 'error');
        }).finally(function() {
          if (btn) { btn.disabled = false; btn.innerHTML = ICON.upload + ' Updates'; }
        });
      }
    );
  };

  SRV.confirmRestart = function(id) {
    showConfirm(
      'Server neustarten',
      'Möchtest du diesen Server wirklich neu starten?',
      'Der Server wird per sudo reboot sofort neu gestartet. Alle laufenden Prozesse werden beendet.',
      function() {
        setPill(id, 'loading', 'REBOOT');
        setInfo(id, 'Neustart wird ausgeführt...');
        stopStatsAutoRefresh(id);
        api('/servers/' + id + '/restart', { method: 'POST' }).then(function() {
          setPill(id, 'offline', 'OFFLINE');
          setInfo(id, 'Server wird neu gestartet... (ca. 30\u201360 Sekunden)');
          toast('Neustart-Befehl gesendet.');
        }).catch(function(err) {
          toast(err.error || 'Neustart fehlgeschlagen.', 'error');
        });
      }
    );
  };

  SRV.openEdit = function(id) {
    var server = allServers.find(function(s) { return s.id === id; });
    if (!server) return;
    editingId = id;
    $('modalTitle').textContent = 'Server bearbeiten';
    $('fLabel').value = server.label;
    $('fHost').value = server.host;
    $('fPort').value = parseInt(server.port) || 22;
    $('fUsername').value = server.username;
    $('fNotes').value = server.notes || '';
    $('fPassword').value = '';
    $('fPrivateKey').value = '';
    $('fPassphrase').value = '';
    setAuthType(server.authType || 'password');
    $('formError').classList.remove('show');
    $('serverModal').classList.add('open');
  };

  SRV.deleteServer = function(id) { deleteServer(id); };

  // ============================================================
  // MODAL
  // ============================================================

  function setAuthType(type) {
    currentAuthType = type;
    $('authPwBtn').classList.toggle('active', type === 'password');
    $('authKeyBtn').classList.toggle('active', type === 'key');
    $('pwFields').style.display = type === 'password' ? '' : 'none';
    $('keyFields').style.display = type === 'key' ? '' : 'none';
  }

  function openAddModal() {
    editingId = null;
    $('modalTitle').textContent = 'Server hinzufügen';
    $('fLabel').value = '';
    $('fHost').value = '';
    $('fPort').value = '22';
    $('fUsername').value = 'root';
    $('fPassword').value = '';
    $('fPrivateKey').value = '';
    $('fPassphrase').value = '';
    $('fNotes').value = '';
    setAuthType('password');
    $('formError').classList.remove('show');
    $('serverModal').classList.add('open');
  }

  function closeModal() {
    $('serverModal').classList.remove('open');
    editingId = null;
  }

  // ============================================================
  // CONFIRM
  // ============================================================

  function showConfirm(title, text, warning, callback) {
    $('confirmTitle').textContent = title;
    $('confirmText').textContent = text;
    $('confirmWarning').textContent = warning;
    confirmCallback = callback;
    $('confirmModal').classList.add('open');
  }

  function closeConfirm() {
    $('confirmModal').classList.remove('open');
    confirmCallback = null;
  }

  // ============================================================
  // INIT
  // ============================================================

  document.addEventListener('DOMContentLoaded', function() {
    $('logoutBtn').addEventListener('click', logout);
    $('addServerBtn').addEventListener('click', openAddModal);
    $('modalCancel').addEventListener('click', closeModal);
    $('modalSave').addEventListener('click', saveServer);
    $('authPwBtn').addEventListener('click', function() { setAuthType('password'); });
    $('authKeyBtn').addEventListener('click', function() { setAuthType('key'); });
    $('confirmCancel').addEventListener('click', closeConfirm);
    $('confirmOk').addEventListener('click', function() {
      if (confirmCallback) confirmCallback();
      closeConfirm();
    });

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        if ($('confirmModal').classList.contains('open')) closeConfirm();
        else if ($('serverModal').classList.contains('open')) closeModal();
      }
    });

    $('serverModal').addEventListener('click', function(e) {
      if (e.target === $('serverModal')) closeModal();
    });
    $('confirmModal').addEventListener('click', function(e) {
      if (e.target === $('confirmModal')) closeConfirm();
    });

    $('serverList').addEventListener('click', function(e) {
      var btn = e.target.closest('[data-action]');
      if (!btn) return;
      var action = btn.dataset.action;
      var id = btn.dataset.id;

      if (action === 'status') SRV.fetchStatus(id);
      else if (action === 'stats') SRV.fetchStats(id);
      else if (action === 'services') SRV.toggleServices(id);
      else if (action === 'update') SRV.runUpdate(id);
      else if (action === 'restart') SRV.confirmRestart(id);
      else if (action === 'edit') SRV.openEdit(id);
      else if (action === 'delete') SRV.deleteServer(id);
      else if (action === 'service-restart') {
        SRV.restartService(btn.dataset.server, btn.dataset.service, btn);
      }
    });

    // Init Obsidian interactions
    var root = $('pageRoot');
    initGlow(root);
    initReveal(root);

    checkAuth();
  });

})();
</script>
</body>
</html>
